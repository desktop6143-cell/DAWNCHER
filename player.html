<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Player Estilo AnimeFire</title>
    <style>
        /* ================= ESTILO BASE ================= */
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body, html {
            width: 100%; height: 100%;
            background-color: #000;
            overflow: hidden;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        .main-container {
            position: relative;
            width: 100vw;
            height: 100vh;
            background: #000;
            display: flex;
            flex-direction: column;
        }

        /* ================= VÍDEO (IFRAME) ================= */
        .video-wrapper {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 1;
        }

        iframe {
            width: 100%; height: 100%;
            border: none;
        }

        /* ================= CAMADA DE TOQUE (O SEGREDO) ================= */
        /* Essa camada detecta o toque mas "deixa passar" o clique para o vídeo quando o menu some */
        .ui-overlay {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 2;
            pointer-events: none; /* Deixa clicar no vídeo por padrão */
            transition: background 0.3s ease;
        }

        .ui-overlay.active {
            pointer-events: auto; /* Bloqueia o vídeo para você clicar nos SEUS botões */
            background: rgba(0, 0, 0, 0.4); /* Efeito de escurecer suave ao abrir o menu */
        }

        /* Área invisível para detectar o toque de abrir o menu */
        .touch-detector {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 3;
        }

        /* ================= CABEÇALHO (IGUAL FOTO 3) ================= */
        .player-header {
            position: absolute;
            top: 0; left: 0; width: 100%;
            padding: calc(env(safe-area-inset-top) + 15px) 20px 40px;
            background: linear-gradient(to bottom, rgba(0,0,0,0.8), transparent);
            color: white;
            z-index: 10;
            display: flex;
            align-items: center;
            gap: 15px;
            transform: translateY(-100%);
            transition: transform 0.3s ease;
        }

        .player-header.show { transform: translateY(0); }

        .btn-back {
            background: rgba(255,255,255,0.1);
            border-radius: 50%;
            width: 40px; height: 40px;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer;
        }

        .video-title {
            font-size: 1rem;
            font-weight: 500;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.8);
        }

        /* ================= BARRA INFERIOR (ESTILO ANIMEFIRE) ================= */
        .player-footer {
            position: absolute;
            bottom: 0; left: 0; width: 100%;
            padding: 20px 20px calc(env(safe-area-inset-bottom) + 10px);
            background: linear-gradient(to top, rgba(0,0,0,0.9), transparent);
            z-index: 10;
            transform: translateY(100%);
            transition: transform 0.3s ease;
        }

        .player-footer.show { transform: translateY(0); }

        /* Barra de Progresso Fictícia (Visual) */
        .progress-container {
            width: 100%;
            height: 4px;
            background: rgba(255,255,255,0.2);
            margin-bottom: 15px;
            border-radius: 2px;
            position: relative;
        }
        .progress-bar {
            width: 30%; /* Exemplo */
            height: 100%;
            background: #00aeef; /* Azul AnimeFire */
            border-radius: 2px;
        }

        .controls-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            color: white;
        }

        .left-controls, .right-controls {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .icon-btn {
            width: 24px; height: 24px;
            cursor: pointer;
            opacity: 0.9;
        }
        .icon-btn:hover { opacity: 1; }

        .time-display {
            font-size: 0.85rem;
            font-family: monospace;
        }

    </style>
</head>
<body>

    <div class="main-container" id="mainContainer">
        
        <div class="touch-detector" id="touchArea"></div>

        <div class="player-header" id="header">
            <div class="btn-back" onclick="window.history.back()">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
            </div>
            <div class="video-title" id="display-title">Carregando...</div>
        </div>

        <div class="ui-overlay" id="uiOverlay"></div>

        <div class="player-footer" id="footer">
            <div class="progress-container">
                <div class="progress-bar"></div>
            </div>
            <div class="controls-row">
                <div class="left-controls">
                    <div class="icon-btn"> <svg viewBox="0 0 24 24" fill="white"><path d="M8 5v14l11-7z"/></svg>
                    </div>
                    <div class="icon-btn"> <svg viewBox="0 0 24 24" fill="white"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02z"/></svg>
                    </div>
                    <div class="time-display">00:00 / --:--</div>
                </div>
                <div class="right-controls">
                    <div class="icon-btn"> <svg viewBox="0 0 24 24" fill="white"><path d="M19 11h-8v6h8v-6zm4 8V4.98C23 3.88 22.1 3 21 3H3c-1.1 0-2 .88-2 1.98V19c0 1.1.9 2 2 2h18c1.1 0 2-.9 2-2zm-2 .02H3V4.97h18v14.05z"/></svg>
                    </div>
                    <div class="icon-btn"> <svg viewBox="0 0 24 24" fill="white"><path d="M19.14 12.94c.04-.3.06-.61.06-.94 0-.32-.02-.64-.07-.94l2.03-1.58c.18-.14.23-.41.12-.61l-1.92-3.32c-.12-.22-.37-.29-.59-.22l-2.39.96c-.5-.38-1.03-.7-1.62-.94l-.36-2.54c-.04-.24-.24-.41-.48-.41h-3.84c-.24 0-.43.17-.47.41l-.36 2.54c-.59.24-1.13.57-1.62.94l-2.39-.96c-.22-.08-.47 0-.59.22L2.74 8.87c-.12.21-.08.47.12.61l2.03 1.58c-.05.3-.09.63-.09.94s.02.64.07.94l-2.03 1.58c-.18.14-.23.41-.12.61l1.92 3.32c.12.22.37.29.59.22l2.39-.96c.5.38 1.03.7 1.62.94l.36 2.54c.05.24.24.41.48.41h3.84c.24 0 .44-.17.47-.41l.36-2.54c.59-.24 1.13-.56 1.62-.94l2.39.96c.22.08.47 0 .59-.22l1.92-3.32c.12-.22.07-.47-.12-.61l-2.01-1.58zM12 15.6c-1.98 0-3.6-1.62-3.6-3.6s1.62-3.6 3.6-3.6 3.6 1.62 3.6 3.6-1.62 3.6-3.6 3.6z"/></svg>
                    </div>
                    <div class="icon-btn"> <svg viewBox="0 0 24 24" fill="white"><path d="M7 14H5v5h5v-2H7v-3zm-2-4h2V7h3V5H5v5zm12 7h-3v2h5v-5h-2v3zM14 5v2h3v3h2V5h-5z"/></svg>
                    </div>
                </div>
            </div>
        </div>

        <div class="video-wrapper">
            <iframe id="video-frame" src="" allow="autoplay; fullscreen" allowfullscreen></iframe>
        </div>

    </div>

<script>
    const header = document.getElementById('header');
    const footer = document.getElementById('footer');
    const overlay = document.getElementById('uiOverlay');
    const touchArea = document.getElementById('touchArea');
    let timer;

    // Função para mostrar/esconder controles
    function toggleUI() {
        const isShowing = header.classList.contains('show');
        
        if (isShowing) {
            hideUI();
        } else {
            showUI();
        }
    }

    function showUI() {
        header.classList.add('show');
        footer.classList.add('show');
        overlay.classList.add('active');
        
        clearTimeout(timer);
        timer = setTimeout(hideUI, 4000); // Esconde após 4 segundos
    }

    function hideUI() {
        header.classList.remove('show');
        footer.classList.remove('show');
        overlay.classList.remove('active');
    }

    // Eventos de toque
    touchArea.addEventListener('click', toggleUI);

    // ==================== LÓGICA DO VÍDEO & AUTOPLAY ====================
    const urlParams = new URLSearchParams(window.location.search);
    const videoUrl = urlParams.get('url');
    const titulo = decodeURIComponent(urlParams.get('titulo') || "Vídeo");

    document.getElementById('display-title').textContent = titulo;

    if (videoUrl) {
        let finalUrl = decodeURIComponent(videoUrl);
        // Autoplay Forçado (Mudo para não bloquear)
        const params = "autoplay=1&mute=1&muted=1&playsinline=1&modestbranding=1";
        finalUrl += (finalUrl.includes('?') ? '&' : '?') + params;
        
        document.getElementById('video-frame').src = finalUrl;
    }

    // Histórico (Sua API)
    function salvarHistorico() {
        const idUser = sessionStorage.getItem('idUsuario');
        if (!idUser) return;
        fetch('SUA_URL_DO_GOOGLE_SCRIPT', {
            method: 'POST',
            mode: 'no-cors',
            body: JSON.stringify({ action: "salvar", id_user: idUser, titulo: titulo })
        });
    }

    setInterval(salvarHistorico, 40000);
</script>
</body>
</html>
