<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Premium Anime Player</title>
    <style>
        :root {
            --primary-color: #6a11cb;
            --secondary-color: #2575fc;
            --bg-gradient: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: var(--bg-gradient);
            height: 100vh;
            width: 100vw;
            display: flex;
            flex-direction: column;
            font-family: 'Segoe UI', Roboto, sans-serif;
            color: white;
            overflow: hidden; /* Proibido scroll */
        }

        /* Top Bar - Estilo Glass */
        .glass-header {
            width: 100%;
            padding: 20px;
            display: flex;
            align-items: center;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(15px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            z-index: 100;
        }

        .btn-voltar {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: white;
            padding: 10px 20px;
            border-radius: 12px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .btn-voltar:hover { background: rgba(255, 255, 255, 0.2); transform: translateX(-5px); }

        .titulo-anime {
            flex: 1;
            text-align: center;
            font-size: 1.1rem;
            letter-spacing: 1px;
            text-shadow: 0 2px 10px rgba(0,0,0,0.5);
            padding-right: 80px; /* Compensa o botão para centralizar real */
        }

        /* Container do Vídeo - O Coração do Layout */
        .viewport-player {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 10px;
            position: relative;
        }

        .video-card {
            width: 100%;
            max-width: 1100px;
            aspect-ratio: 16 / 9;
            background: #000;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 20px 50px rgba(0,0,0,0.8);
            position: relative;
            border: 1px solid rgba(255,255,255,0.1);
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
            display: block;
        }

        /* Efeito de iluminação atrás do vídeo */
        .glow {
            position: absolute;
            width: 60%;
            height: 40%;
            background: var(--secondary-color);
            filter: blur(150px);
            opacity: 0.2;
            pointer-events: none;
            z-index: 0;
        }

        /* Ajuste Mobile Landscape (Deitado) */
        @media (orientation: landscape) {
            .glass-header { display: none; }
            .viewport-player { padding: 0; }
            .video-card { border-radius: 0; max-width: 100vw; height: 100vh; border: none; }
        }

        /* Ajuste para telas muito pequenas */
        @media (max-width: 600px) {
            .titulo-anime { font-size: 0.9rem; padding-right: 0; margin-left: 10px; text-align: left;}
            .btn-voltar { padding: 8px 12px; font-size: 12px; }
        }
    </style>
</head>
<body>

    <header class="glass-header">
        <button class="btn-voltar" onclick="voltar()">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>
            Voltar
        </button>
        <h2 class="titulo-anime" id="video-title">Carregando...</h2>
    </header>

    <main class="viewport-player">
        <div class="glow"></div>
        <div class="video-card">
            <iframe id="main-iframe" src="" allowfullscreen allow="autoplay; encrypted-media"></iframe>
        </div>
    </main>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const videoSrc = urlParams.get('url');
        const videoTitle = urlParams.get('titulo') || 'Assistindo Anime';

        if (videoSrc) {
            document.getElementById('main-iframe').src = decodeURIComponent(videoSrc);
            document.getElementById('video-title').textContent = decodeURIComponent(videoTitle);
        }

        function voltar() {
            if (window.history.length > 1) {
                window.history.back();
            } else {
                window.location.href = 'index.html';
            }
        }
    </script>
</body>
</html>
