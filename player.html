<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Player de Vídeo</title>
    <style>
        /* Reseta margens e garante que o fundo ocupe a tela toda */
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #000;
            overflow: hidden; /* Impede scroll desnecessário */
            display: flex;
            flex-direction: column;
            font-family: sans-serif;
        }

        /* Área superior com botão e título */
        .header {
            padding: 10px 15px;
            display: flex;
            align-items: center;
            gap: 15px;
            background: linear-gradient(to bottom, rgba(0,0,0,0.8), transparent);
            z-index: 10;
        }

        .voltar { 
            color: #fff; 
            text-decoration: none; 
            background: rgba(255,255,255,0.1); 
            padding: 8px 15px; 
            border-radius: 8px; 
            border: 1px solid rgba(255,255,255,0.2);
            cursor: pointer;
            font-size: 14px;
            white-space: nowrap;
        }

        h2 { 
            color: #fff;
            margin: 0; 
            font-size: 16px;
            font-weight: 400;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        /* Container que centraliza o vídeo no meio da tela */
        .main-content {
            flex: 1;
            display: flex;
            align-items: center; /* Centraliza verticalmente */
            justify-content: center; /* Centraliza horizontalmente */
            padding: 5px;
        }

        .video-wrapper { 
            width: 100%;       
            max-width: 100%; 
            aspect-ratio: 16 / 9; 
            position: relative;
            background: #000;
        }

        iframe { 
            position: absolute;
            top: 0;
            left: 0;
            width: 100%; 
            height: 100%; 
            border: none; 
        }

        /* Ajuste para quando o celular estiver deitado */
        @media (orientation: landscape) {
            .header { display: none; } /* Esconde o topo para focar no vídeo */
            .main-content { padding: 0; }
            .video-wrapper { height: 100vh; aspect-ratio: auto; }
        }
    </style>
</head>
<body>

        <button onclick="voltarParaLista()" class="voltar">← Voltar</button>
        <h2 id="display-titulo">Carregando...</h2>
    </div>
    
    <div class="main-content">
        <div class="video-wrapper">
           <iframe id="meuVideo" src="" allowfullscreen allow="autoplay"></iframe>
        </div>
    </div>
