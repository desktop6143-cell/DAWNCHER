<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ultra Cinematic Player</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body, html {
            width: 100%;
            height: 100%;
            background-color: #000;
            overflow: hidden;
            font-family: 'Inter', sans-serif;
        }

        /* Container Principal: Ocupa a tela toda */
        .main-wrapper {
            position: relative;
            width: 100vw;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Iframe ocupa 100% da viewport ou mantém o aspect ratio no desktop */
        .video-container {
            width: 100%;
            height: 100%;
            max-width: 100%;
            background: #000;
            position: relative;
            z-index: 1;
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        /* Overlay de Controles Flutuantes (Auto-hide) */
        .floating-controls {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            padding: 20px;
            background: linear-gradient(to bottom, rgba(0,0,0,0.8) 0%, transparent 100%);
            z-index: 10;
            display: flex;
            align-items: center;
            gap: 20px;
            transition: opacity 0.4s ease, transform 0.4s ease;
            opacity: 0; /* Começa invisível */
            pointer-events: none;
        }

        /* Quando o usuário interage, os controles aparecem */
        .main-wrapper:active .floating-controls,
        .main-wrapper:hover .floating-controls {
            opacity: 1;
            pointer-events: auto;
        }

        .back-circle {
            width: 45px;
            height: 45px;
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            color: white;
            transition: 0.3s;
        }

        .back-circle:active { transform: scale(0.9); background: rgba(255,255,255,0.3); }

        .video-info {
            color: white;
            text-shadow: 0 2px 10px rgba(0,0,0,0.8);
        }

        .video-info h2 {
            font-size: 1rem;
            font-weight: 500;
            max-width: 70vw;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        /* Ajuste para Mobile Landscape (Deitado) */
        @media (orientation: landscape) {
            .video-container { height: 100vh; }
        }
    </style>
</head>
<body>

    <div class="main-wrapper" id="wrapper">
        <div class="floating-controls" id="controls">
            <div class="back-circle" onclick="voltar()">
                <svg width="24" height="24" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"/>
                </svg>
            </div>
            <div class="video-info">
                <h2 id="video-title">Carregando...</h2>
            </div>
        </div>

        <div class="video-container">
            <iframe id="video-frame" src="" allowfullscreen allow="autoplay; encrypted-media"></iframe>
        </div>
    </div>

    <script>
        const params = new URLSearchParams(window.location.search);
        const url = params.get('url');
        const titulo = params.get('titulo');

        if (url) {
            document.getElementById('video-frame').src = decodeURIComponent(url);
            document.getElementById('video-title').innerText = titulo ? decodeURIComponent(titulo) : 'Assistindo';
        }

        // Lógica para esconder os controles automaticamente no mobile
        const controls = document.getElementById('controls');
        const wrapper = document.getElementById('wrapper');
        let timeout;

        function showControls() {
            controls.style.opacity = '1';
            controls.style.pointerEvents = 'auto';
            clearTimeout(timeout);
            timeout = setTimeout(() => {
                controls.style.opacity = '0';
                controls.style.pointerEvents = 'none';
            }, 3000); // Esconde após 3 segundos sem toque
        }

        wrapper.addEventListener('touchstart', showControls);
        wrapper.addEventListener('mousemove', showControls);

        function voltar() {
            window.history.length > 1 ? window.history.back() : window.location.href = 'index.html';
        }
    </script>
</body>
</html>
