<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ultra Cinematic Player</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body, html {
            width: 100%;
            height: 100%;
            background-color: #000;
            overflow: hidden;
            font-family: 'Inter', sans-serif;
        }

        .main-wrapper {
            position: relative;
            width: 100vw;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .video-container {
            width: 100%;
            height: 100%;
            background: #000;
            position: relative;
            z-index: 1;
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        .floating-controls {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            padding: 20px;
            background: linear-gradient(to bottom, rgba(0,0,0,0.8) 0%, transparent 100%);
            z-index: 10;
            display: flex;
            align-items: center;
            gap: 20px;
            transition: opacity 0.4s ease, transform 0.4s ease;
            opacity: 0;
            pointer-events: none;
        }

        .main-wrapper:active .floating-controls,
        .main-wrapper:hover .floating-controls {
            opacity: 1;
            pointer-events: auto;
        }

        .back-circle {
            width: 45px;
            height: 45px;
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            color: white;
            transition: 0.3s;
        }

        .back-circle:active { 
            transform: scale(0.9); 
            background: rgba(255,255,255,0.3); 
        }

        .video-info {
            color: white;
            text-shadow: 0 2px 10px rgba(0,0,0,0.8);
        }

        .video-info h2 {
            font-size: 1rem;
            font-weight: 500;
            max-width: 70vw;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        @media (orientation: landscape) {
            .video-container { height: 100vh; }
        }
    </style>
</head>
<body>

    <div class="main-wrapper" id="wrapper">
        <div class="floating-controls" id="controls">
            <div class="back-circle" onclick="voltar()">
                <svg width="24" height="24" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"/>
                </svg>
            </div>
            <div class="video-info">
                <h2 id="video-title">Carregando...</h2>
            </div>
        </div>

        <div class="video-container">
            <iframe id="video-frame" src="" allowfullscreen allow="autoplay; encrypted-media"></iframe>
        </div>
    </div>

   <script>
const API_URL = "https://script.google.com/macros/s/AKfycby_9taGHbp8yR_uUmnOtAl2CkuNtLFkYYG3OyUcoSLLR8q4MmKBdDrH7q81Og6IYZ1K/exec";

// ==================== FUNÇÃO ATUALIZADA ====================
async function salvarHistorico() {
    if (!idUser) return;

    const minutosAssistidos = Math.floor((Date.now() - tempoInicial) / 60000);
    const hoje = new Date().toLocaleDateString('pt-BR');
    const tempoFinal = minutosAssistidos >= 15 ? "Assistido" : minutosAssistidos + " min";

    try {
        // Buscar registro existente
        const resp = await fetch(`${API_URL}?id_user=${idUser}&data=${hoje}`);
        const result = await resp.json();
        
        let registros = result.data || [];
        
        const registroExistente = registros.find(r => 
            r.titulo && r.titulo.toLowerCase().trim() === tituloLimpo.toLowerCase().trim()
        );

        if (registroExistente) {
            // Atualizar
            await fetch(API_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    action: "update",
                    id: registroExistente.id,        // precisa ter coluna "id"
                    tempo: tempoFinal,
                    url_acesso: decodeURIComponent(urlVideo || '')
                })
            });
        } else {
            // Criar novo
            await fetch(API_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    id_user: idUser,
                    titulo: tituloLimpo,
                    url_acesso: decodeURIComponent(urlVideo || ''),
                    data: hoje,
                    tempo: tempoFinal,
                    status: "Assistindo"
                })
            });
        }
    } catch (err) {
        console.error("Erro ao salvar histórico:", err);
    }
}
   </script>      
</body>
</html>
