<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Player AnimeFire Fix</title>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        :root { --af-blue: #00aeef; --af-bg: #1A1A1A; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Quicksand', sans-serif; }
        body, html { width: 100%; height: 100%; background-color: #000; overflow: hidden; }

        .player-container {
            position: relative;
            width: 100vw; height: 100vh;
            display: flex; align-items: center; justify-content: center;
        }

        /* Camada do Vídeo - Z-INDEX BAIXO */
        .video-wrapper {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 1;
        }
        iframe { width: 100%; height: 100%; border: none; }

        /* Camada da Interface - Z-INDEX ALTO */
        .ui-overlay {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 10;
            background: linear-gradient(to bottom, rgba(0,0,0,0.6) 0%, transparent 20%, transparent 80%, rgba(0,0,0,0.7) 100%);
            display: flex; flex-direction: column; justify-content: space-between;
            pointer-events: none; opacity: 0; transition: opacity 0.3s;
        }

        .player-container.active .ui-overlay { opacity: 1; pointer-events: auto; }

        /* Área de toque central: se clicar nela, os controles aparecem */
        .touch-area {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 5;
        }

        /* HEADER */
        .header { padding: 20px; display: flex; align-items: center; gap: 15px; color: white; }
        .btn-back { cursor: pointer; width: 35px; height: 35px; background: rgba(255,255,255,0.1); border-radius: 50%; display: flex; align-items: center; justify-content: center; }

        /* PROGRESS BAR TOP (O que você curtiu) */
        .progress-area { padding: 0 20px; margin-bottom: 10px; }
        .bar-bg { width: 100%; height: 4px; background: rgba(255,255,255,0.2); border-radius: 10px; position: relative; }
        .bar-fill { 
            width: 0%; height: 100%; background: var(--af-blue); 
            box-shadow: 0 0 10px var(--af-blue); border-radius: 10px; 
        }

        /* CONTROLES */
        .controls { padding: 0 20px 20px; display: flex; justify-content: space-between; align-items: center; }
        .group { display: flex; align-items: center; gap: 20px; }
        .icon { width: 24px; height: 24px; fill: white; cursor: pointer; }
        .time { color: white; font-size: 0.85rem; }
    </style>
</head>
<body>

    <div class="player-container" id="pContainer">
        <div class="touch-area" onclick="handleTouch()"></div>

        <div class="video-wrapper">
            <iframe id="vIframe" allow="autoplay; fullscreen"></iframe>
        </div>

        <div class="ui-overlay">
            <div class="header">
                <div class="btn-back" onclick="window.history.back()">
                    <svg viewBox="0 0 24 24" width="20" height="20" stroke="white" stroke-width="2" fill="none"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
                </div>
                <span id="vTitulo">Carregando...</span>
            </div>

            <div class="footer">
                <div class="progress-area">
                    <div class="bar-bg">
                        <div class="bar-fill" id="vBar"></div>
                    </div>
                </div>
                <div class="controls">
                    <div class="group">
                        <svg class="icon" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
                        <span class="time">00:00 / --:--</span>
                    </div>
                    <div class="group">
                        <svg class="icon" onclick="toggleFS()" viewBox="0 0 24 24"><path d="M7 14H5v5h5v-2H7v-3zm-2-4h2V7h3V5H5v5zm12 7h-3v2h5v-5h-2v3zM14 5v2h3v3h2V5h-5z"/></svg>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const container = document.getElementById('pContainer');
        const iframe = document.getElementById('vIframe');
        const bar = document.getElementById('vBar');
        let timer;

        // Função para mostrar interface
        function handleTouch() {
            container.classList.add('active');
            clearTimeout(timer);
            timer = setTimeout(() => {
                container.classList.remove('active');
            }, 3000);
        }

        // Função Tela Cheia corrigida
        function toggleFS() {
            if (!document.fullscreenElement) {
                container.requestFullscreen().catch(e => {});
            } else {
                document.exitFullscreen();
            }
        }

        // Lógica de URL
        const p = new URLSearchParams(window.location.search);
        let videoUrl = p.get('url');
        document.getElementById('vTitulo').innerText = decodeURIComponent(p.get('titulo') || "Anime");

        if (videoUrl) {
            videoUrl = decodeURIComponent(videoUrl);
            
            // CORREÇÃO CRUCIAL PARA GOOGLE DRIVE
            if (videoUrl.includes('drive.google.com')) {
                let id = videoUrl.split('/d/')[1]?.split('/')[0] || videoUrl.split('id=')[1]?.split('&')[0];
                // Usamos o link de preview que é o único que funciona em players externos
                videoUrl = `https://drive.google.com/file/d/${id}/preview`;
            }
            
            iframe.src = videoUrl;
        }

        // Remover a barra que se movia sozinha se o vídeo não estiver carregado
        // A barra só deve se mover se você tiver o controle real do vídeo (via API)
        // Por enquanto, deixaremos ela estática em 0% até o vídeo iniciar no Drive.
    </script>
</body>
</html>
