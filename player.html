<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ultra Cinematic Player</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body, html {
            width: 100%;
            height: 100%;
            background-color: #000;
            overflow: hidden;
            font-family: 'Inter', system-ui, sans-serif;
        }
        .main-wrapper {
            position: relative;
            width: 100vw;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .video-container {
            width: 100%;
            height: 100%;
            background: #000;
            position: relative;
        }
        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }
        .floating-controls {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            padding: 20px 20px 40px;
            background: linear-gradient(to bottom, rgba(0,0,0,0.85) 0%, transparent 100%);
            z-index: 10;
            display: flex;
            align-items: center;
            gap: 20px;
            transition: opacity 0.4s ease;
            opacity: 0;
            pointer-events: none;
        }
        .main-wrapper.show-controls .floating-controls {
            opacity: 1;
            pointer-events: auto;
        }

        .back-circle {
            width: 48px;
            height: 48px;
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.25);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            color: white;
            transition: all 0.2s ease;
        }
        .back-circle:active {
            transform: scale(0.9);
            background: rgba(255, 255, 255, 0.25);
        }
        .video-info h2 {
            font-size: 1.15rem;
            font-weight: 500;
            color: white;
            text-shadow: 0 2px 15px rgba(0,0,0,0.9);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 80vw;
        }

        /* Mensagem quando não tem URL */
        .error-message {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #ff6b6b;
            text-align: center;
            display: none;
        }
    </style>
</head>
<body>
    <div class="main-wrapper" id="wrapper">
        <div class="floating-controls" id="controls">
            <div class="back-circle" id="back-btn">
                <svg width="26" height="26" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M15 19l-7-7 7-7"/>
                </svg>
            </div>
            <div class="video-info">
                <h2 id="video-title">Carregando...</h2>
            </div>
        </div>

        <div class="video-container">
            <iframe id="video-frame" src="" allowfullscreen allow="autoplay; encrypted-media; fullscreen"></iframe>
            <div class="error-message" id="error-msg">
                <h2>URL do vídeo não encontrada</h2>
            </div>
        </div>
    </div>

<script>
// ==================== CONFIGURAÇÕES ====================
const API_HISTORICO = 'https://script.google.com/macros/s/AKfycbwe7k3THvlFrsfvSpAl3JfyF7FqRNaTzoxSfK5S12PzPaS6JZmIK89LCgyWczmgCf7VCQ/exec';
const idUser = sessionStorage.getItem('idUsuario') || localStorage.getItem('idUsuario');

// Parâmetros da URL
const urlParams = new URLSearchParams(window.location.search);
const videoUrl = urlParams.get('url');
const tituloRaw = urlParams.get('titulo') || "Vídeo sem título";
const tituloFormatado = decodeURIComponent(tituloRaw);

// Elementos
const videoTitleEl = document.getElementById('video-title');
const videoFrame = document.getElementById('video-frame');
const wrapper = document.getElementById('wrapper');
const errorMsg = document.getElementById('error-msg');

// ==================== INICIALIZAÇÃO ====================
videoTitleEl.textContent = tituloFormatado;

if (videoUrl) {
    videoFrame.src = decodeURIComponent(videoUrl);
} else {
    errorMsg.style.display = 'block';
}

// Extrai número do episódio
let episodioAtual = "1";
const matchEp = tituloFormatado.match(/Epis[óo]dio\s*(\d+)/i);
if (matchEp) episodioAtual = matchEp[1];

// ==================== FUNÇÕES ====================
function obterTempoFormatado() {
    return new Date().toLocaleTimeString('pt-BR', {
        hour: '2-digit',
        minute: '2-digit',
        second: '2-digit',
        hour12: false
    });
}

async function salvarNoHistorico() {
    if (!idUser) return;

    const dados = {
        action: "salvar",
        id_user: idUser,
        titulo: tituloFormatado,
        url_acesso: window.location.href,
        episodio: episodioAtual,
        tempo: obterTempoFormatado()
    };

    try {
        const response = await fetch(API_HISTORICO, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(dados)
        });
        const resultado = await response.json();
        console.log(`[${dados.tempo}] ✅ Histórico salvo`);
    } catch (err) {
        console.error("❌ Erro ao salvar histórico:", err);
    }
}

// ==================== CONTROLES ====================
// Mostrar controles ao tocar na tela (melhor experiência mobile)
let timeoutControles;

function mostrarControles() {
    wrapper.classList.add('show-controls');
    clearTimeout(timeoutControles);
    timeoutControles = setTimeout(() => {
        wrapper.classList.remove('show-controls');
    }, 4000);
}

document.getElementById('back-btn').addEventListener('click', () => {
    window.history.back();
});

// Toque na tela
wrapper.addEventListener('click', (e) => {
    // Se clicou no botão voltar, não faz toggle
    if (e.target.closest('#back-btn')) return;
    mostrarControles();
});

// Hover no desktop
wrapper.addEventListener('mousemove', () => {
    mostrarControles();
});

// ==================== EVENTOS ====================
window.addEventListener('load', () => {
    salvarNoHistorico();
});

setInterval(salvarNoHistorico, 30000);

window.addEventListener('beforeunload', () => {
    salvarNoHistorico();
});
</script>
</body>
</html>
