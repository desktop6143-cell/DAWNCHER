<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Player de Vídeo Responsivo</title>
    <style>
        * { box-sizing: border-box; }
        
        body { 
            background: #000; 
            margin: 0; 
            padding: 0;
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            min-height: 100vh; 
            color: white; 
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; 
            overflow-x: hidden;
        }

        /* Cabeçalho compacto para mobile */
        .header-area {
            width: 100%;
            padding: 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            z-index: 10;
        }

        .voltar { 
            color: #fff; 
            text-decoration: none; 
            background: rgba(255,255,255,0.15); 
            padding: 8px 16px; 
            border-radius: 20px; 
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.2);
            cursor: pointer;
            font-size: 14px;
            transition: 0.3s;
            align-self: flex-start; /* Fica na esquerda */
        }

        .voltar:active { transform: scale(0.95); background: rgba(255,255,255,0.3); }

        h2 { 
            margin: 5px 0;
            font-weight: 400; 
            text-align: center;
            font-size: 1.1rem;
            width: 90%;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis; /* Corta o texto se for muito longo */
        }

        /* Container do Player */
        .video-container { 
            width: 100%;       
            max-width: 1200px; 
            aspect-ratio: 16 / 9; 
            background: #000; 
            position: relative;
            box-shadow: 0 4px 30px rgba(0,0,0,0.5);
        }

        iframe { 
            position: absolute;
            top: 0;
            left: 0;
            width: 100%; 
            height: 100%; 
            border: none; 
        }

        /* Ajustes para telas pequenas (Celular) */
        @media (max-width: 768px) {
            .header-area { padding: 10px; }
            h2 { font-size: 1rem; }
            .voltar { font-size: 12px; padding: 6px 12px; }
            
            /* Se o celular estiver deitado, esconde o título para focar no vídeo */
            @media (orientation: landscape) {
                .header-area { display: none; }
                .video-container { max-width: 100vw; height: 100vh; aspect-ratio: auto; }
            }
        }
    </style>
</head>
<body>

    <div class="header-area">
        <button onclick="voltarParaLista()" class="voltar">← Voltar</button>
        <h2 id="display-titulo">Carregando...</h2>
    </div>
    
    <div class="video-container">
       <iframe id="meuVideo" src="" allowfullscreen allow="autoplay"></iframe>
    </div>

<script>
    const params = new URLSearchParams(window.location.search);
    const titulo = decodeURIComponent(params.get('titulo') || 'Sem título');
    const videoUrl = decodeURIComponent(params.get('url'));

    const player = document.getElementById('meuVideo');
    const titleElement = document.getElementById('display-titulo');

    if (videoUrl) {
        player.src = videoUrl;
        titleElement.innerText = titulo;
    } else {
        titleElement.innerText = "Erro: Vídeo não encontrado.";
    }

    function voltarParaLista() {
        if (window.history.length > 1) {
            window.history.back();
        } else {
            window.location.href = "index.html";
        }
    }
</script>

</body>
</html>
