<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ultra Cinematic Player</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body, html {
            width: 100%;
            height: 100%;
            background-color: #000;
            overflow: hidden;
            font-family: 'Inter', sans-serif;
        }
        .main-wrapper {
            position: relative;
            width: 100vw;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .video-container {
            width: 100%;
            height: 100%;
            background: #000;
            position: relative;
        }
        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }
        .floating-controls {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            padding: 20px;
            background: linear-gradient(to bottom, rgba(0,0,0,0.8) 0%, transparent 100%);
            z-index: 10;
            display: flex;
            align-items: center;
            gap: 20px;
            transition: opacity 0.4s ease;
            opacity: 0;
            pointer-events: none;
        }
        .main-wrapper:active .floating-controls,
        .main-wrapper:hover .floating-controls {
            opacity: 1;
            pointer-events: auto;
        }
        .back-circle {
            width: 45px;
            height: 45px;
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            color: white;
        }
        .video-info h2 {
            font-size: 1.1rem;
            font-weight: 500;
            color: white;
            text-shadow: 0 2px 10px rgba(0,0,0,0.8);
        }
    </style>
</head>
<body>
    <div class="main-wrapper" id="wrapper">
        <div class="floating-controls" id="controls">
            <div class="back-circle" onclick="voltar()">
                <svg width="24" height="24" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"/>
                </svg>
            </div>
            <div class="video-info">
                <h2 id="video-title">Carregando...</h2>
            </div>
        </div>
        <div class="video-container">
            <iframe id="video-frame" src="" allowfullscreen allow="autoplay; encrypted-media"></iframe>
        </div>
    </div>

<script>
// ==================== 1. CONFIGURAÇÕES E VARIÁVEIS GLOBAIS ====================
const API_HISTORICO = 'https://script.google.com/macros/s/AKfycbwe7k3THvlFrsfvSpAl3JfyF7FqRNaTzoxSfK5S12PzPaS6JZmIK89LCgyWczmgCf7VCQ/exec';
const idUser        = sessionStorage.getItem('idUsuario');

// Parâmetros da URL e Formatação de Título
const urlParams       = new URLSearchParams(window.location.search);
const videoUrl        = urlParams.get('url');
const tituloFormatado = decodeURIComponent(urlParams.get('titulo') || "Vídeo sem título");

// Elementos da Interface
document.getElementById('video-title').textContent = tituloFormatado;

if (videoUrl) {
    document.getElementById('video-frame').src = decodeURIComponent(videoUrl);
} else {
    document.getElementById('video-title').textContent = "URL do vídeo não encontrada!";
}

// Extração do Número do Episódio (Ex: "Anime - Episódio 05" -> "05")
let episodioAtual = "1";
const matchEp = tituloFormatado.match(/Epis[óo]dio\s*(\d+)/i);
if (matchEp) {
    episodioAtual = matchEp[1];
}


// ==================== 2. FUNÇÕES DE TEMPO E FORMATAÇÃO ====================

/**
 * Gera o horário atual no formato HH:mm:ss (24h)
 * Essencial para que a comparação de "progresso maior" funcione na planilha.
 */
function obterTempoFormatado() {
    return new Date().toLocaleTimeString('pt-BR', {
        hour: '2-digit', 
        minute: '2-digit', 
        second: '2-digit',
        hour12: false 
    });
}


// ==================== 3. FUNÇÃO SALVAR HISTÓRICO ====================

/**
 * Envia os dados de progresso para o Google Apps Script.
 * Verifica o ID do usuário e envia o tempo formatado.
 */
async function salvarNoHistorico() {
    if (!idUser) return;

    const tempoAssistido = obterTempoFormatado();

    const dados = {
        action: "salvar",
        id_user: idUser,
        titulo: tituloFormatado,
        url_acesso: window.location.href,
        episodio: episodioAtual, 
        tempo: tempoAssistido
    };

    try {
        const response = await fetch(API_HISTORICO, {
            method: 'POST',
            redirect: 'follow',
            headers: { 'Content-Type': 'text/plain;charset=utf-8' },
            body: JSON.stringify(dados)
        });
        
        const resultado = await response.json();
        console.log(`[${tempoAssistido}] ✅ API Respondeu: ${resultado.message}`);
    } catch (err) {
        console.error("❌ Erro ao salvar histórico:", err);
    }
}


// ==================== 4. GATILHOS E EVENTOS ====================

// Ação de Voltar
function voltar() {
    window.history.back();
}

// Evento: Quando a página termina de carregar
window.addEventListener('load', () => {
    salvarNoHistorico();
});

// Evento: Salvamento Automático a cada 30 segundos
setInterval(() => {
    console.log("⏱️ Iniciando salvamento automático...");
    salvarNoHistorico();
}, 30000);

// Evento: Quando o usuário fecha a aba ou sai da página
window.addEventListener('beforeunload', () => {
    salvarNoHistorico();
});

</script>
</body>
</html>
