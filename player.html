<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ultra Cinematic Player</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body, html {
            width: 100%;
            height: 100%;
            background-color: #000;
            overflow: hidden;
            font-family: 'Inter', sans-serif;
        }
        .main-wrapper {
            position: relative;
            width: 100vw;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .video-container {
            width: 100%;
            height: 100%;
            background: #000;
            position: relative;
        }
        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }
        .floating-controls {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            padding: 20px;
            background: linear-gradient(to bottom, rgba(0,0,0,0.8) 0%, transparent 100%);
            z-index: 10;
            display: flex;
            align-items: center;
            gap: 20px;
            transition: opacity 0.4s ease;
            opacity: 0;
            pointer-events: none;
        }
        .main-wrapper:active .floating-controls,
        .main-wrapper:hover .floating-controls {
            opacity: 1;
            pointer-events: auto;
        }
        .back-circle {
            width: 45px;
            height: 45px;
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            color: white;
        }
        .video-info h2 {
            font-size: 1.1rem;
            font-weight: 500;
            color: white;
            text-shadow: 0 2px 10px rgba(0,0,0,0.8);
        }
    </style>
</head>
<body>
    <div class="main-wrapper" id="wrapper">
        <div class="floating-controls" id="controls">
            <div class="back-circle" onclick="voltar()">
                <svg width="24" height="24" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"/>
                </svg>
            </div>
            <div class="video-info">
                <h2 id="video-title">Carregando...</h2>
            </div>
        </div>
        <div class="video-container">
            <iframe id="video-frame" src="" allowfullscreen allow="autoplay; encrypted-media"></iframe>
        </div>
    </div>

<script>
// ==================== CONFIGURAÇÕES ====================
const API_HISTORICO = 'https://script.google.com/macros/s/AKfycby9NAoshp94IRIq-lx66zsjQQqJk--dp9WA-Rlx8igETrqriCMMXFrtt32iiPpUylgvRw/exec';
const idUser = sessionStorage.getItem('idUsuario');
 // url ds
// Pegar parâmetros da URL
const urlParams = new URLSearchParams(window.location.search);
const videoUrl = urlParams.get('url');
const tituloBruto = urlParams.get('titulo') || "Vídeo sem título";
const tituloFormatado = decodeURIComponent(tituloBruto);

document.getElementById('video-title').textContent = tituloFormatado;

// Carregar vídeo no iframe
if (videoUrl) {
    document.getElementById('video-frame').src = decodeURIComponent(videoUrl);
} else {
    document.getElementById('video-title').textContent = "URL do vídeo não encontrada!";
}

// Tenta extrair o número do episódio do título (Ex: "Naruto - Episódio 12" -> "12")
let episodioAtual = "1";
const matchEp = tituloFormatado.match(/Epis[óo]dio\s*(\d+)/i);
if (matchEp) {
    episodioAtual = matchEp[1];
}

// ==================== SALVAR NO HISTÓRICO ====================
async function salvarNoHistorico() {
    if (!idUser) return;

    // ATENÇÃO: toLocaleTimeString pega a hora do PC (ex: 15:30). 
    // Idealmente, aqui deveria ser o tempo real do vídeo (ex: "00:12:45")
    const tempoAssistido = new Date().toLocaleTimeString('pt-BR', {hour: '2-digit', minute: '2-digit', second: '2-digit'});

    try {
        const response = await fetch(API_HISTORICO, {
            method: 'POST',
            redirect: 'follow',
            headers: { 'Content-Type': 'text/plain;charset=utf-8' },
            body: JSON.stringify({
                action: "salvar",
                id_user: idUser,
                titulo: tituloFormatado,
                url_acesso: window.location.href, // Salva o link da sua página player com os parâmetros
                episodio: episodioAtual, 
                tempo: tempoAssistido
            })
        });
        
        const resultado = await response.json();
        console.log("✅ API Respondeu:", resultado.message);
    } catch (err) {
        console.error("Erro ao salvar histórico:", err);
    }
}

// Voltar para página anterior
function voltar() {
    window.history.back();
}

// ==================== GATILHOS DE SALVAMENTO ====================
// Salva quando a página termina de carregar
window.addEventListener('load', () => {
    salvarNoHistorico();
});

// Tenta salvar quando o usuário fechar a aba ou sair da página
window.addEventListener('beforeunload', () => {
    salvarNoHistorico();
});

// BÔNUS: Salva o histórico a cada 2 minutos (120000 ms) automaticamente 
// caso o usuário fique muito tempo assistindo sem fechar a página
setInterval(() => {
    salvarNoHistorico();
}, 120000); 

</script>
</body>
</html>
