<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Ultra Cinematic Player - Pro</title>
    <style>
        /* ================= RESET E BASE ================= */
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body, html {
            width: 100%;
            height: 100%;
            background-color: #050505; /* Fundo levemente mais suave que o preto puro */
            overflow: hidden;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            position: fixed;
        }

        .main-wrapper {
            position: relative;
            width: 100vw;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #000;
        }

        /* ================= CONTAINER DO VÍDEO ================= */
        .video-container {
            width: 100%;
            height: 100%;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 1;
            background: #000;
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
            display: block;
            opacity: 0; /* Começa invisível para transição suave */
            transition: opacity 0.8s ease-in-out;
        }

        iframe.loaded {
            opacity: 1;
        }

        /* ================= TELA DE CARREGAMENTO (SPINNER) ================= */
        .loader-container {
            position: absolute;
            z-index: 2;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 15px;
            transition: opacity 0.5s ease;
        }

        .spinner {
            width: 50px;
            height: 50px;
            border: 4px solid rgba(255, 255, 255, 0.1);
            border-left-color: #ffffff;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        .loader-text {
            color: rgba(255, 255, 255, 0.6);
            font-size: 0.9rem;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* ================= CAMADAS E CONTROLES (UX) ================= */
        .click-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 5;
            cursor: pointer;
        }

        .floating-controls {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            padding: calc(env(safe-area-inset-top) + 20px) 25px 30px 25px;
            background: linear-gradient(180deg, rgba(0,0,0,0.85) 0%, rgba(0,0,0,0.4) 60%, transparent 100%);
            z-index: 10;
            display: flex;
            align-items: center;
            gap: 18px;
            transition: opacity 0.4s cubic-bezier(0.4, 0, 0.2, 1), transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            opacity: 0;
            pointer-events: none;
            transform: translateY(-15px);
        }

        .floating-controls.active {
            opacity: 1;
            pointer-events: auto;
            transform: translateY(0);
        }

        /* Estilo Premium para o Botão Voltar (Glassmorphism) */
        .back-circle {
            width: 48px;
            height: 48px;
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            color: #fff;
            flex-shrink: 0;
            transition: background 0.3s, transform 0.2s;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }

        .back-circle:active {
            transform: scale(0.92);
            background: rgba(255, 255, 255, 0.15);
        }

        .video-info {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .video-info h2 {
            font-size: 1.1rem;
            font-weight: 600;
            color: #ffffff;
            text-shadow: 0 2px 8px rgba(0,0,0,0.8);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 65vw;
        }

        .video-info span {
            font-size: 0.8rem;
            color: rgba(255, 255, 255, 0.7);
            font-weight: 400;
            text-shadow: 0 1px 4px rgba(0,0,0,0.8);
        }
    </style>
</head>
<body>

    <div class="main-wrapper" id="wrapper">
        
        <div class="loader-container" id="loader">
            <div class="spinner"></div>
            <div class="loader-text">Conectando...</div>
        </div>

        <div class="click-overlay" id="overlay"></div>

        <div class="floating-controls" id="controls">
            <div class="back-circle" onclick="voltar()" title="Voltar">
                <svg width="24" height="24" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M11 19l-7-7 7-7m-7 7h18"/>
                </svg>
            </div>
            <div class="video-info">
                <h2 id="video-title">Carregando...</h2>
                <span id="video-subtitle">Preparando player</span>
            </div>
        </div>

        <div class="video-container">
            <iframe 
                id="video-frame" 
                src="" 
                allowfullscreen 
                webkitallowfullscreen 
                mozallowfullscreen
                allow="autoplay; fullscreen; encrypted-media; picture-in-picture">
            </iframe>
        </div>
    </div>

<script>
// ==================== 1. INTERFACE E ANIMAÇÕES ====================
const controls = document.getElementById('controls');
const overlay = document.getElementById('overlay');
const iframe = document.getElementById('video-frame');
const loader = document.getElementById('loader');
let hideTimer;

// Gerencia a exibição do menu ao tocar na tela
function toggleControls() {
    controls.classList.add('active');
    clearTimeout(hideTimer);
    hideTimer = setTimeout(() => {
        controls.classList.remove('active');
    }, 3500); // Esconde após 3.5 segundos
}

overlay.addEventListener('click', toggleControls);
overlay.addEventListener('touchstart', toggleControls);

// Esconde o spinner suavemente quando o iframe termina de carregar
iframe.addEventListener('load', () => {
    loader.style.opacity = '0';
    setTimeout(() => {
        loader.style.display = 'none';
        iframe.classList.add('loaded'); // Faz o vídeo aparecer suavemente (Fade-in)
        document.getElementById('video-subtitle').textContent = "Reproduzindo";
    }, 500);
});


// ==================== 2. LÓGICA DE URL E AUTOPLAY ====================
const urlParams = new URLSearchParams(window.location.search);
const videoUrl = urlParams.get('url');
const tituloFormatado = decodeURIComponent(urlParams.get('titulo') || "Vídeo sem título");

document.getElementById('video-title').textContent = tituloFormatado;

// Extração de Episódio para a UI
let episodioAtual = "1";
const matchEp = tituloFormatado.match(/Epis[óo]dio\s*(\d+)/i);
if (matchEp) { 
    episodioAtual = matchEp[1]; 
    document.getElementById('video-subtitle').textContent = `Episódio ${episodioAtual}`;
}

// Configuração do Iframe com Autoplay Forçado
if (videoUrl) {
    let finalUrl = decodeURIComponent(videoUrl);
    
    /* PARÂMETROS ESSENCIAIS PARA FUNCIONAR NO CELULAR:
       playsinline=1 -> Impede o iPhone de abrir em tela cheia sozinho.
       autoplay=1 -> Tenta iniciar automaticamente.
       mute=1 & muted=1 -> Obriga o vídeo a começar mudo, única forma do autoplay não ser bloqueado.
    */
    const parametrosPlayer = "playsinline=1&autoplay=1&mute=1&muted=1&modestbranding=1";
    
    if(finalUrl.includes('?')) {
        finalUrl += "&" + parametrosPlayer;
    } else {
        finalUrl += "?" + parametrosPlayer;
    }
    
    iframe.src = finalUrl;
} else {
    document.getElementById('video-title').textContent = "Erro na URL";
    document.getElementById('video-subtitle').textContent = "Nenhum vídeo fornecido.";
    loader.style.display = 'none';
}


// ==================== 3. API E HISTÓRICO ====================
const API_HISTORICO = 'https://script.google.com/macros/s/AKfycbwe7k3THvlFrsfvSpAl3JfyF7FqRNaTzoxSfK5S12PzPaS6JZmIK89LCgyWczmgCf7VCQ/exec';
const idUser = sessionStorage.getItem('idUsuario');

function obterTempoFormatado() {
    return new Date().toLocaleTimeString('pt-BR', {
        hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: false 
    });
}

async function salvarNoHistorico() {
    if (!idUser) return;
    const dados = {
        action: "salvar",
        id_user: idUser,
        titulo: tituloFormatado,
        url_acesso: window.location.href,
        episodio: episodioAtual, 
        tempo: obterTempoFormatado()
    };

    try {
        await fetch(API_HISTORICO, {
            method: 'POST',
            mode: 'no-cors', // Fundamental para não travar no iOS
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(dados)
        });
        console.log("Progresso salvo: " + obterTempoFormatado());
    } catch (err) { 
        console.error("Erro histórico:", err); 
    }
}

function voltar() { window.history.back(); }

// Gatilhos de salvamento
window.addEventListener('load', salvarNoHistorico);
setInterval(salvarNoHistorico, 30000); // Salva a cada 30 segundos
</script>
</body>
</html>
