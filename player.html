<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ultima Player Pro</title>
    <style>
        :root {
            --accent: #8a2be2;
            --bg: #050505;
            --glass: rgba(255, 255, 255, 0.08);
            --border: rgba(255, 255, 255, 0.15);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            background-color: var(--bg);
            color: white;
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* Ambient Glow - O toque de mestre */
        .ambient-light {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 80vw;
            height: 50vh;
            background: radial-gradient(circle, var(--accent) 0%, transparent 70%);
            filter: blur(120px);
            opacity: 0.15;
            z-index: 0;
            pointer-events: none;
        }

        /* Header Premium */
        header {
            display: flex;
            align-items: center;
            padding: 18px 24px;
            background: linear-gradient(to bottom, rgba(0,0,0,0.9), transparent);
            z-index: 10;
            animation: slideDown 0.6s ease;
        }

        .back-btn {
            background: var(--glass);
            border: 1px solid var(--border);
            color: white;
            padding: 10px 18px;
            border-radius: 14px;
            cursor: pointer;
            backdrop-filter: blur(12px);
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 14px;
            font-weight: 500;
            transition: all 0.3s;
        }

        .back-btn:hover { background: var(--border); transform: scale(1.05); }

        .title-wrapper {
            flex: 1;
            margin-left: 20px;
        }

        h2 {
            font-size: 1.1rem;
            font-weight: 500;
            letter-spacing: -0.5px;
            opacity: 0.9;
        }

        /* Player Zone */
        main {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 15px;
            z-index: 5;
        }

        .player-container {
            width: 100%;
            max-width: 1200px;
            aspect-ratio: 16 / 9;
            background: #000;
            border-radius: 24px;
            overflow: hidden;
            box-shadow: 0 30px 60px rgba(0,0,0,0.8);
            border: 1px solid var(--border);
            position: relative;
            animation: fadeIn 1s ease;
        }

        iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
        }

        /* Animações */
        @keyframes slideDown {
            from { transform: translateY(-100%); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.95); }
            to { opacity: 1; transform: scale(1); }
        }

        /* Landscape Mode (Mobile Deitado) */
        @media (orientation: landscape) and (max-height: 500px) {
            header { display: none; }
            main { padding: 0; }
            .player-container { border-radius: 0; border: none; height: 100vh; }
        }

        /* Mobile Adjusts */
        @media (max-width: 600px) {
            header { padding: 12px; }
            .back-btn span { display: none; } /* Esconde texto 'Voltar' no celular */
            h2 { font-size: 0.95rem; }
        }
    </style>
</head>
<body>

    <div class="ambient-light"></div>

    <header>
        <button class="back-btn" onclick="voltar()">
            <svg width="20" height="20" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/>
            </svg>
            <span>Voltar</span>
        </button>
        <div class="title-wrapper">
            <h2 id="video-title">Carregando...</h2>
        </div>
    </header>

    <main>
        <div class="player-container">
            <iframe id="video-frame" src="" allowfullscreen allow="autoplay; encrypted-media"></iframe>
        </div>
    </main>

    <script>
        const params = new URLSearchParams(window.location.search);
        const url = params.get('url');
        const titulo = params.get('titulo');

        if (url) {
            document.getElementById('video-frame').src = decodeURIComponent(url);
            document.getElementById('video-title').innerText = titulo ? decodeURIComponent(titulo) : 'Assistindo';
        }

        function voltar() {
            window.history.length > 1 ? window.history.back() : window.location.href = 'index.html';
        }
    </script>
</body>
</html>
