<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ultra Cinematic Player</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body, html {
            width: 100%;
            height: 100%;
            background-color: #000;
            overflow: hidden;
            font-family: 'Inter', sans-serif;
        }

        .main-wrapper {
            position: relative;
            width: 100vw;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .video-container {
            width: 100%;
            height: 100%;
            background: #000;
            position: relative;
            z-index: 1;
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        .floating-controls {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            padding: 20px;
            background: linear-gradient(to bottom, rgba(0,0,0,0.8) 0%, transparent 100%);
            z-index: 10;
            display: flex;
            align-items: center;
            gap: 20px;
            transition: opacity 0.4s ease, transform 0.4s ease;
            opacity: 0;
            pointer-events: none;
        }

        .main-wrapper:active .floating-controls,
        .main-wrapper:hover .floating-controls {
            opacity: 1;
            pointer-events: auto;
        }

        .back-circle {
            width: 45px;
            height: 45px;
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            color: white;
            transition: 0.3s;
        }

        .back-circle:active { 
            transform: scale(0.9); 
            background: rgba(255,255,255,0.3); 
        }

        .video-info {
            color: white;
            text-shadow: 0 2px 10px rgba(0,0,0,0.8);
        }

        .video-info h2 {
            font-size: 1rem;
            font-weight: 500;
            max-width: 70vw;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        @media (orientation: landscape) {
            .video-container { height: 100vh; }
        }
    </style>
</head>
<body>

    <div class="main-wrapper" id="wrapper">
        <div class="floating-controls" id="controls">
            <div class="back-circle" onclick="voltar()">
                <svg width="24" height="24" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"/>
                </svg>
            </div>
            <div class="video-info">
                <h2 id="video-title">Carregando...</h2>
            </div>
        </div>

        <div class="video-container">
            <iframe id="video-frame" src="" allowfullscreen allow="autoplay; encrypted-media"></iframe>
        </div>
    </div>

   
<script>
// ==================== CONFIGURAÇÕES ====================
const API_HISTORICO = 'https://sheetdb.io/api/v1/b8bvlm2gypqd0';

const params = new URLSearchParams(window.location.search);
const urlVideo = params.get('url');
const tituloVideo = params.get('titulo');

const idUser = sessionStorage.getItem('idUsuario');
const tituloLimpo = decodeURIComponent(tituloVideo || '');

let intervaloSalvar = null;
const tempoInicial = Date.now();

if (urlVideo && idUser) {
    document.getElementById('video-frame').src = decodeURIComponent(urlVideo);
    document.getElementById('video-title').innerText = tituloLimpo || 'Assistindo...';

    intervaloSalvar = setInterval(salvarHistorico, 30000);
    window.addEventListener('beforeunload', salvarHistorico);
}

// ==================== historico  ====================
async function salvarHistorico() {
    if (!idUser) return;

    const minutosAssistidos = Math.floor((Date.now() - tempoInicial) / 60000);
    const hoje = new Date().toLocaleDateString('pt-BR');
    let tempoFinal = minutosAssistidos >= 15 ? "Assistido" : minutosAssistidos + " minutos";

    try {
        // 1. Procuramos se já existe uma linha com esse ID de usuário E esse título
        // A sintaxe do SheetDB para múltiplos filtros na URL é assim:
        const busca = await fetch(`${API_HISTORICO}/search?id_user=${idUser}&titulo=${encodeURIComponent(tituloLimpo)}`);
        const registros = await busca.json();

        // 2. Se encontrou algo e a data for a de hoje, vamos atualizar a PRIMEIRA ocorrência
        if (registros.length > 0) {
            // Filtramos para garantir que estamos mexendo no registro de hoje
            const registroHoje = registros.find(r => r.data === hoje);

            if (registroHoje) {
                // No SheetDB, para atualizar sem uma coluna ID, usamos a rota de busca no PATCH
                // Vamos atualizar baseando-se no id_user e titulo (que são únicos para essa sessão)
                await fetch(`${API_HISTORICO}/id_user/${idUser}`, { // Usamos id_user como chave
                    method: 'PATCH',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        condition: { "titulo": tituloLimpo, "data": hoje }, // Critérios extras
                        data: { 
                            "tempo": tempoFinal,
                            "url_acesso": decodeURIComponent(urlVideo || '')
                        }
                    })
                });
                console.log(`🔄 ATUALIZADO → ${tempoFinal}`);
                return; // Sai da função para não criar duplicata
            }
        }

        // 3. Se não encontrou (ou não é de hoje), CRIA novo registro
        await fetch(API_HISTORICO, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                data: [{
                    "id_user": idUser,
                    "titulo": tituloLimpo,
                    "url_acesso": decodeURIComponent(urlVideo || ''),
                    "data": hoje,
                    "tempo": tempoFinal,
                    "status": "Assistindo"
                }]
            })
        });
        console.log(`✅ Nova linha criada → ${tempoFinal}`);

    } catch (err) {
        console.error("Erro ao salvar histórico:", err);
    }
}
// ==================== CONTROLES ====================
const controls = document.getElementById('controls');
const wrapper = document.getElementById('wrapper');
let timeout;

function showControls() {
    controls.style.opacity = '1';
    controls.style.pointerEvents = 'auto';
    clearTimeout(timeout);
    timeout = setTimeout(() => {
        controls.style.opacity = '0';
        controls.style.pointerEvents = 'none';
    }, 3000);
}

wrapper.addEventListener('touchstart', showControls);
wrapper.addEventListener('mousemove', showControls);

function voltar() {
    if (intervaloSalvar) clearInterval(intervaloSalvar);
    salvarHistorico();
    setTimeout(() => window.history.back(), 400);
}
</script>
</body>
</html>
