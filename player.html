<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Player Estilo AnimeFire Original</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@300;400;500&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --af-blue: #00aeef;
            --af-bg: #1A1A1A;
        }

        * {
            margin: 0; padding: 0; box-sizing: border-box;
            font-family: 'Quicksand', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body, html {
            width: 100%; height: 100%;
            background-color: #000;
            overflow: hidden;
        }

        /* Container Principal */
        .af-player-container {
            position: relative;
            width: 100vw;
            height: 100vh;
            background: #000;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        /* Iframe do Vídeo (Fundo) */
        .video-canvas {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 1;
        }
        iframe { width: 100%; height: 100%; border: none; }

        /* Camada de UI (Controles) */
        .af-ui-overlay {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 10;
            background: linear-gradient(to bottom, rgba(0,0,0,0.8) 0%, transparent 20%, transparent 80%, rgba(0,0,0,0.9) 100%);
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            opacity: 0;
            transition: opacity 0.3s ease;
            pointer-events: none;
        }

        .af-player-container.active .af-ui-overlay {
            opacity: 1;
            pointer-events: auto;
        }

        /* Área de toque central para abrir menu */
        .touch-zone {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 5;
        }

        /* --- BARRA SUPERIOR (CONFORME FOTO E CÓDIGO) --- */
        .af-header {
            padding: 20px;
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .af-btn-back {
            cursor: pointer;
            width: 35px; height: 35px;
            display: flex; align-items: center; justify-content: center;
            background: rgba(255,255,255,0.1);
            border-radius: 50%;
        }

        .af-title {
            color: #fff;
            font-size: 1.1rem;
            font-weight: 400;
            text-shadow: 0 2px 4px rgba(0,0,0,0.5);
        }

        /* --- BARRA DE PROGRESSO (A "TOP" QUE VOCÊ QUER) --- */
        .af-progress-wrapper {
            padding: 0 20px;
            width: 100%;
            margin-bottom: 10px;
        }

        .af-progress-bar {
            width: 100%;
            height: 5px;
            background: rgba(255,255,255,0.2);
            border-radius: 10px;
            position: relative;
            cursor: pointer;
        }

        .af-progress-filled {
            width: 45%; /* Exemplo de progresso */
            height: 100%;
            background: var(--af-blue);
            border-radius: 10px;
            box-shadow: 0 0 12px rgba(0, 174, 239, 0.6);
            position: relative;
        }

        /* Bolinha da barra (Seeker) */
        .af-progress-filled::after {
            content: '';
            position: absolute;
            right: -6px; top: -4px;
            width: 13px; height: 13px;
            background: #fff;
            border-radius: 50%;
            box-shadow: 0 0 5px rgba(0,0,0,0.5);
        }

        /* --- CONTROLES INFERIORES --- */
        .af-controls {
            padding: 0 25px 25px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .af-controls-left, .af-controls-right {
            display: flex;
            align-items: center;
            gap: 25px;
        }

        .af-icon {
            width: 24px; height: 24px;
            fill: #fff;
            cursor: pointer;
            transition: transform 0.1s;
        }

        .af-icon:active { transform: scale(0.9); }

        .af-time {
            color: #fff;
            font-size: 0.9rem;
            font-weight: 300;
        }

        /* --- MENUS DE QUALIDADE/VELOCIDADE --- */
        .af-menu-pop {
            position: absolute;
            bottom: 80px; right: 20px;
            background: var(--af-bg);
            border-radius: 5px;
            width: 250px;
            display: none;
            flex-direction: column;
            overflow: hidden;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
        }

        .af-menu-item {
            padding: 15px;
            color: #fff;
            border-bottom: 1px solid rgba(255,255,255,0.05);
            display: flex;
            justify-content: space-between;
            cursor: pointer;
        }

        .af-menu-item:hover { background: rgba(255,255,255,0.1); }
        .af-menu-item.active { color: var(--af-blue); }

    </style>
</head>
<body>

    <div class="af-player-container" id="mainPlayer">
        
        <div class="touch-zone" onclick="toggleUI()"></div>

        <div class="video-canvas">
            <iframe id="iframePlayer" src="" allow="autoplay; fullscreen" allowfullscreen></iframe>
        </div>

        <div class="af-ui-overlay" id="uiOverlay">
            
            <div class="af-header">
                <div class="af-btn-back" onclick="window.history.back()">
                    <svg viewBox="0 0 24 24" width="20" height="20" stroke="white" stroke-width="2.5" fill="none"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
                </div>
                <div class="af-title" id="video-title">Carregando Nome do Anime...</div>
            </div>

            <div></div>

            <div class="af-footer-area">
                
                <div class="af-progress-wrapper">
                    <div class="af-progress-bar">
                        <div class="af-progress-filled" id="progressFill"></div>
                    </div>
                </div>

                <div class="af-controls">
                    <div class="af-controls-left">
                        <svg class="af-icon" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg> <div class="af-time">08:12 / 24:00</div>
                    </div>
                    
                    <div class="af-controls-right">
                        <svg class="af-icon" onclick="toggleMenu()" viewBox="0 0 24 24"><path d="M19.14 12.94c.04-.3.06-.61.06-.94 0-.32-.02-.64-.07-.94l2.03-1.58c.18-.14.23-.41.12-.61l-1.92-3.32c-.12-.22-.37-.29-.59-.22l-2.39.96c-.5-.38-1.03-.7-1.62-.94l-.36-2.54c-.04-.24-.24-.41-.48-.41h-3.84c-.24 0-.43.17-.47.41l-.36 2.54c-.59.24-1.13.57-1.62.94l-2.39-.96c-.22-.08-.47 0-.59.22L2.74 8.87c-.12.21-.08.47.12.61l2.03 1.58c-.05.3-.09.63-.09.94s.02.64.07.94l-2.03 1.58c-.18.14-.23.41-.12.61l1.92 3.32c.12.22.37.29.59.22l2.39-.96c.5.38 1.03.7 1.62.94l.36 2.54c.05.24.24.41.48.41h3.84c.24 0 .44-.17.47-.41l.36-2.54c.59-.24 1.13-.56 1.62-.94l2.39.96c.22.08.47 0 .59-.22l1.92-3.32c.12-.22.07-.47-.12-.61l-2.01-1.58zM12 15.6c-1.98 0-3.6-1.62-3.6-3.6s1.62-3.6 3.6-3.6 3.6 1.62 3.6 3.6-1.62 3.6-3.6 3.6z"/></svg>
                        
                        <svg class="af-icon" onclick="toggleFS()" viewBox="0 0 24 24"><path d="M7 14H5v5h5v-2H7v-3zm-2-4h2V7h3V5H5v5zm12 7h-3v2h5v-5h-2v3zM14 5v2h3v3h2V5h-5z"/></svg>
                    </div>
                </div>
            </div>

            <div class="af-menu-pop" id="qualityMenu">
                <div class="af-menu-item"><span>Reprodução automática</span> <input type="checkbox" checked></div>
                <div class="af-menu-item"><span>Velocidade</span> <span>Normal ></span></div>
                <div class="af-menu-item active"><span>Qualidade</span> <span>1080p ></span></div>
            </div>

        </div>
    </div>

<script>
    const player = document.getElementById('mainPlayer');
    const menu = document.getElementById('qualityMenu');
    let uiTimer;

    // Função para ligar/desligar UI
    function toggleUI() {
        if (player.classList.contains('active')) {
            hideUI();
        } else {
            showUI();
        }
    }

    function showUI() {
        player.classList.add('active');
        clearTimeout(uiTimer);
        uiTimer = setTimeout(hideUI, 4000);
    }

    function hideUI() {
        player.classList.remove('active');
        menu.style.display = 'none';
    }

    function toggleMenu() {
        menu.style.display = (menu.style.display === 'flex') ? 'none' : 'flex';
        clearTimeout(uiTimer); // Mantém o menu aberto
    }

    // Tela Cheia
    function toggleFS() {
        if (!document.fullscreenElement) {
            player.requestFullscreen().catch(err => {});
        } else {
            document.exitFullscreen();
        }
    }

    // Lógica de URL e Iframe
    const urlParams = new URLSearchParams(window.location.search);
    const videoUrl = urlParams.get('url');
    const titulo = urlParams.get('titulo') || "Youjo Senki - Episódio 1";

    document.getElementById('video-title').textContent = decodeURIComponent(titulo);

    if (videoUrl) {
        let finalUrl = decodeURIComponent(videoUrl);
        // Adicionando parâmetros para tentar remover controles originais e dar autoplay
        const params = "autoplay=1&controls=0&modestbranding=1&rel=0";
        finalUrl += (finalUrl.includes('?') ? '&' : '?') + params;
        document.getElementById('iframePlayer').src = finalUrl;
    }

    // Movimentação da barra (apenas visual para esta demonstração)
    let p = 45;
    setInterval(() => {
        if(p < 100) {
            p += 0.05;
            document.getElementById('progressFill').style.width = p + "%";
        }
    }, 1000);

</script>
</body>
</html>
