<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ultra Cinematic Player</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body, html {
            width: 100%;
            height: 100%;
            background-color: #000;
            overflow: hidden;
            font-family: 'Inter', sans-serif;
        }

        .main-wrapper {
            position: relative;
            width: 100vw;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .video-container {
            width: 100%;
            height: 100%;
            background: #000;
            position: relative;
            z-index: 1;
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        .floating-controls {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            padding: 20px;
            background: linear-gradient(to bottom, rgba(0,0,0,0.8) 0%, transparent 100%);
            z-index: 10;
            display: flex;
            align-items: center;
            gap: 20px;
            transition: opacity 0.4s ease, transform 0.4s ease;
            opacity: 0;
            pointer-events: none;
        }

        .main-wrapper:active .floating-controls,
        .main-wrapper:hover .floating-controls {
            opacity: 1;
            pointer-events: auto;
        }

        .back-circle {
            width: 45px;
            height: 45px;
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            color: white;
            transition: 0.3s;
        }

        .back-circle:active { 
            transform: scale(0.9); 
            background: rgba(255,255,255,0.3); 
        }

        .video-info {
            color: white;
            text-shadow: 0 2px 10px rgba(0,0,0,0.8);
        }

        .video-info h2 {
            font-size: 1rem;
            font-weight: 500;
            max-width: 70vw;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        @media (orientation: landscape) {
            .video-container { height: 100vh; }
        }
    </style>
</head>
<body>

    <div class="main-wrapper" id="wrapper">
        <div class="floating-controls" id="controls">
            <div class="back-circle" onclick="voltar()">
                <svg width="24" height="24" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"/>
                </svg>
            </div>
            <div class="video-info">
                <h2 id="video-title">Carregando...</h2>
            </div>
        </div>

        <div class="video-container">
            <iframe id="video-frame" src="" allowfullscreen allow="autoplay; encrypted-media"></iframe>
        </div>
    </div>

    <script>
        // ==================== CONFIGURAÇÕES ====================
        const API_HISTORICO = 'https://sheetdb.io/api/v1/b8bvlm2gypqd0';
        
        const params = new URLSearchParams(window.location.search);
        const urlVideo = params.get('url');
        const tituloVideo = params.get('titulo');

        let historicoSalvo = false;
        let timeoutSalvar = null;

        // ==================== INICIALIZAÇÃO ====================
        if (urlVideo) {
            const frame = document.getElementById('video-frame');
            const tituloElement = document.getElementById('video-title');

            frame.src = decodeURIComponent(urlVideo);
            tituloElement.innerText = tituloVideo ? decodeURIComponent(tituloVideo) : 'Assistindo...';

            // Salva o histórico apenas após 30 segundos de visualização
            timeoutSalvar = setTimeout(() => {
                salvarNoHistorico(decodeURIComponent(tituloVideo || 'Sem título'), urlVideo);
            }, 30000);
        }

        // ==================== FUNÇÃO DE HISTÓRICO ====================
        async function salvarNoHistorico(titulo, url) {
            if (historicoSalvo) return;

            const idUser = sessionStorage.getItem('idUsuario');
            if (!idUser) {
                console.warn("ID do usuário não encontrado no sessionStorage");
                return;
            }

            try {
                const response = await fetch(API_HISTORICO, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        data: [{
                            "id_user": idUser,
                            "titulo": titulo,
                            "url_acesso": url,
                            "data": new Date().toLocaleDateString('pt-BR'),
                            "hora": new Date().toLocaleTimeString('pt-BR'),
                            "tempo": "Assistido"
                        }]
                    })
                });

                if (response.ok) {
                    historicoSalvo = true;
                    console.log(`✅ Histórico salvo para usuário ${idUser}`);
                } else {
                    console.error("Erro na API SheetDB");
                }
            } catch (err) {
                console.error("Erro ao salvar histórico:", err);
            }
        }

        // ==================== CONTROLES DO PLAYER ====================
        const controls = document.getElementById('controls');
        const wrapper = document.getElementById('wrapper');
        let timeoutControles;

        function showControls() {
            controls.style.opacity = '1';
            controls.style.pointerEvents = 'auto';
            
            clearTimeout(timeoutControles);
            timeoutControles = setTimeout(() => {
                controls.style.opacity = '0';
                controls.style.pointerEvents = 'none';
            }, 3000);
        }

        wrapper.addEventListener('touchstart', showControls);
        wrapper.addEventListener('mousemove', showControls);

        function voltar() {
            if (window.history.length > 1) {
                window.history.back();
            } else {
                window.location.href = 'index.html';
            }
        }

        // Limpeza ao sair da página
        window.addEventListener('beforeunload', () => {
            if (timeoutSalvar) clearTimeout(timeoutSalvar);
        });
    </script>
</body>
</html>
