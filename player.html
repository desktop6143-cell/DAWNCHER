<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Player de Vídeo</title>
    <style>
        body { 
            background: #000; 
            margin: 0; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            min-height: 100vh; 
            color: white; 
            font-family: sans-serif; 
            padding: 20px;
        }
        .video-container { 
            width: 100%;       
            max-width: 1100px; 
            aspect-ratio: 16 / 9; 
            background: #000; 
            box-shadow: 0 0 50px rgba(0,0,0,0.8); 
            border-radius: 10px;
            overflow: hidden;
        }
        /* Iframe ocupa tudo */
        iframe { width: 100%; height: 100%; border: none; }
        
        .voltar { 
            position: absolute; 
            top: 20px; 
            left: 20px; 
            color: #fff; 
            text-decoration: none; 
            background: rgba(255,255,255,0.1); 
            padding: 10px 20px; 
            border-radius: 50px; 
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.2);
            z-index: 10;
            cursor: pointer;
        }
        h2 { 
            margin-top: 60px; 
            margin-bottom: 20px; 
            font-weight: 300; 
            text-align: center;
            font-size: 1.2rem;
        }
    </style>
</head>
<body>
    <button onclick="voltarParaLista()" class="voltar">← Voltar para episódios</button>
    <h2 id="display-titulo">Carregando...</h2>
    
    <div class="video-container">
       <iframe id="meuVideo" src="" allowfullscreen allow="autoplay"></iframe>
    </div>

<script>
    // 1. PEGAR PARÂMETROS DA URL
    const params = new URLSearchParams(window.location.search);
    const titulo = decodeURIComponent(params.get('titulo') || 'Sem título');
    const videoUrl = decodeURIComponent(params.get('url'));

    const player = document.getElementById('meuVideo');
    document.getElementById('display-titulo').innerText = titulo;

    // 2. CARREGAR O VÍDEO NO IFRAME
    if (videoUrl) {
        player.src = videoUrl;
    } else {
        document.getElementById('display-titulo').innerText = "Erro: Vídeo não encontrado.";
    }

    // 3. FUNÇÃO VOLTAR
    function voltarParaLista() {
        // Se houver histórico, volta, senão vai para a home
        if (window.history.length > 1) {
            window.history.back();
        } else {
            window.location.href = "index.html";
        }
    }

    /* 
       AVISO: Funções de 'salvarTempo' e 'currentTime' foram removidas 
       pois o Google Drive dentro de um <iframe> não permite que seu site 
       saiba em que minuto o vídeo está por questões de segurança.
    */
</script>

</body>
</html>
