<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - Fórum do DEV</title>
  <link rel="stylesheet" type="text/css" href="main.css">
</head>
<body>
  <div class="wrapper">
    <div class="form-wrapper sign-in">
      <!-- Removi o action para o JS controlar o envio -->
      <form id="loginForm">
        <h2>Login</h2>
        <div class="input-group">
          <input type="text" id="name" required>
          <label>Username</label>
        </div>
        <div class="input-group">
          <input type="password" id="senha" required>
          <label>Password</label>
        </div>
        <div class="remember">
          <label><input type="checkbox"> Remember me</label>
        </div>
        <button type="submit" id="btn-entrar">Login</button>
      </form>
    </div>
  </div>

<script>
// ==================== CONFIGURAÇÕES ====================
const API_URL = 'https://script.google.com/macros/s/AKfycbz80YTbLREd9RkdyEoqjSvOFqJMDzA3NHiydliTTAgWyH8vdK4tm0A5nicsEqb-RXvR/exec';
// nova api
const loginForm = document.getElementById('loginForm');
const btnEntrar = document.getElementById('btn-entrar');

loginForm.addEventListener('submit', async (e) => {
    e.preventDefault();

    const usuario = document.getElementById('name').value.trim();
    const senha = document.getElementById('senha').value.trim();

    if (!usuario || !senha) {
        alert("Por favor, preencha usuário e senha!");
        return;
    }

    btnEntrar.innerText = "Verificando...";
    btnEntrar.disabled = true;

    try {
        const response = await fetch(API_URL, {
            method: 'POST',
            headers: {
                'Content-Type': 'text/plain;charset=utf-8'   // ← Mudança principal
            },
            body: JSON.stringify({
                action: "login",
                usuario: usuario,
                senha: senha
            })
        });

        if (!response.ok) throw new Error("Erro na resposta do servidor");

        const resultado = await response.json();

        if (resultado.status === "success") {
            const u = resultado.usuario;
            sessionStorage.setItem('logado', 'true');
            sessionStorage.setItem('idUsuario', u.id);
            sessionStorage.setItem('nomeUsuario', u.name || u.usuario);

            window.location.href = "base/p1.html";
        } else {
            alert(resultado.message || "Usuário ou senha incorretos!");
        }

    } catch (error) {
        console.error("Erro técnico:", error);
        alert("Erro ao conectar com o servidor. Tente novamente.");
    } finally {
        btnEntrar.innerText = "Login";
        btnEntrar.disabled = false;
    }
});
</script>

</body>
</html>
