<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - Fórum do DEV</title>
  <link rel="stylesheet" type="text/css" href="main.css">
</head>
<body>
  <div class="wrapper">
    <div class="form-wrapper sign-in">
      <!-- Removi o action para o JS controlar o envio -->
      <form id="loginForm">
        <h2>Login</h2>
        <div class="input-group">
          <input type="text" id="name" required>
          <label>Username</label>
        </div>
        <div class="input-group">
          <input type="password" id="senha" required>
          <label>Password</label>
        </div>
        <div class="remember">
          <label><input type="checkbox"> Remember me</label>
        </div>
        <button type="submit" id="btn-entrar">Login</button>
      </form>
    </div>
  </div>

<script>
// ==================== CONFIGURAÇÕES ====================
const API_URL = 'https://script.google.com/macros/s/AKfycbyWrAn7elgz8N4cTky97X60g3T2l3TY_7Yc5CSptzMqmvlWKWVlr8Qjv8gIiqyCVQNd/exec';

const loginForm = document.getElementById('loginForm');
const btnEntrar = document.getElementById('btn-entrar');

loginForm.addEventListener('submit', async (e) => {
    e.preventDefault(); 

    const userField = document.getElementById('name').value.trim();
    const passField = document.getElementById('senha').value.trim();

    btnEntrar.innerText = "Verificando...";
    btnEntrar.disabled = true;

    try {
        const response = await fetch(API_URL);
        
        if (!response.ok) throw new Error("Erro ao acessar o banco");

        const usuarios = await response.json();

        // Busca do usuário
        const usuarioAchado = usuarios.find(u => {
            const nomePlanilha = (u.name || u.usuario || "").toString().trim();
            const senhaPlanilha = (u.senha || u.password || "").toString().trim();
            return nomePlanilha === userField && senhaPlanilha === passField;
        });

        if (usuarioAchado) {
            console.log("✅ Login bem-sucedido! ID:", usuarioAchado.id);
            
            sessionStorage.setItem('logado', 'true');
            sessionStorage.setItem('idUsuario', usuarioAchado.id);
            sessionStorage.setItem('nomeUsuario', usuarioAchado.name || usuarioAchado.usuario);

            window.location.href = "base/p1.html";
        } else {
            alert("Usuário ou senha incorretos!");
        }

    } catch (error) {
        console.error("Erro técnico:", error);
        alert("Erro ao conectar com o servidor. Tente novamente.");
    } finally {
        btnEntrar.innerText = "Login";
        btnEntrar.disabled = false;
    }
});
</script>

</body>
</html>
