<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - Fórum do DEV</title>
  <link rel="stylesheet" type="text/css" href="main.css">
</head>
<body>
  <div class="wrapper">
    <div class="form-wrapper sign-in">
      <!-- Removi o action para o JS controlar o envio -->
      <form id="loginForm">
        <h2>Login</h2>
        <div class="input-group">
          <input type="text" id="name" required>
          <label>Username</label>
        </div>
        <div class="input-group">
          <input type="password" id="senha" required>
          <label>Password</label>
        </div>
        <div class="remember">
          <label><input type="checkbox"> Remember me</label>
        </div>
        <button type="submit" id="btn-entrar">Login</button>
      </form>
    </div>
  </div>

<script>
   // 1. Configurações Iniciais
const API_URL = 'https://docs.google.com/spreadsheets/d/1mbKJa_NhmlmO6i-wT7VWMkKQSbaFQe4nxr8G4w1O5mg/edit#gid=0';
const loginForm = document.getElementById('loginForm');
const btnEntrar = document.getElementById('btn-entrar');

// 2. Evento de Envio do Formulário
loginForm.addEventListener('submit', async (e) => {
    e.preventDefault(); // Impede o recarregamento da página

    // Captura os valores dos campos (id="name" e id="senha")
    const userField = document.getElementById('name').value.trim();
    const passField = document.getElementById('senha').value.trim();

    // Inicia estado de carregamento no botão
    btnEntrar.innerText = "Verificando...";
    btnEntrar.disabled = true;

    try {
        // Faz a chamada para a API do SheetDB
        const response = await fetch(API_URL);
        
        if (!response.ok) {
            throw new Error("Erro ao acessar a planilha");
        }

        const usuarios = await response.json();

        // 3. Validação Crucial
        // Usamos 'u.name' porque na sua imagem a coluna está como "name"
        const usuarioEncontrado = usuarios.find(u => {
            const nomePlanilha = u.name ? u.name.toString().trim() : "";
            const senhaPlanilha = u.senha ? u.senha.toString().trim() : "";
            
            return nomePlanilha === userField && senhaPlanilha === passField;
        });

        if (usuarioEncontrado) {
            // Sucesso: Salva a sessão e redireciona
            sessionStorage.setItem('logado', 'true');
            sessionStorage.setItem('nomeUsuario', usuarioEncontrado.name);
            
            alert("Login realizado com sucesso! Bem-vindo, " + usuarioEncontrado.name);
            window.location.href = "base/p1.html";
        } else {
            // Falha: Dados incorretos
            alert("Usuário ou senha incorretos! Tente novamente.");
        }

    } catch (error) {
        // Trata erros de rede ou da API
        console.error("Erro na conexão:", error);
        alert("Erro técnico: Não foi possível conectar ao banco de dados.");
    } finally {
        // 4. Finalização (Impede o carregamento infinito)
        btnEntrar.innerText = "Login";
        btnEntrar.disabled = false;
    }
});
</script>
</body>
</html>
