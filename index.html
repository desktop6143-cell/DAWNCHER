<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - Fórum do DEV</title>
  <link rel="stylesheet" type="text/css" href="main.css">
</head>
<body>
  <div class="wrapper">
    <div class="form-wrapper sign-in">
      <!-- Removi o action para o JS controlar o envio -->
      <form id="loginForm">
        <h2>Login</h2>
        <div class="input-group">
          <input type="text" id="ID" required>
          <label>Username</label>
        </div>
        <div class="input-group">
          <input type="password" id="senha" required>
          <label>Password</label>
        </div>
        <div class="remember">
          <label><input type="checkbox"> Remember me</label>
        </div>
        <button type="submit" id="btn-entrar">Login</button>
      </form>
    </div>
  </div>

<script>
    const API_URL = 'https://sheetdb.io/api/v1/et92hg0rvu16i';
    const loginForm = document.getElementById('loginForm');
    const btnEntrar = document.getElementById('btn-entrar');

    loginForm.addEventListener('submit', async (e) => {
        e.preventDefault();
        
        // Desabilita o botão para evitar múltiplos cliques
        btnEntrar.innerText = "Verificando...";
        btnEntrar.disabled = true;

        const userField = document.getElementById('name').value;
        const passField = document.getElementById('senha').value;

        try {
            // Faz a requisição para a API do SheetDB
            const response = await fetch(API_URL);
            const usuarios = await response.json();

            // Procura o usuário na planilha (colunas: nome e senha)
            // Certifique-se que na sua planilha o topo das colunas seja "nome" e "senha"
            const usuarioValido = usuarios.find(u => u.nome === userField && u.senha === passField);

            if (usuarioValido) {
                sessionStorage.setItem('logado', 'true');
                // Salva o nome do usuário para usar na aba de informação depois
                sessionStorage.setItem('nomeUsuario', usuarioValido.nome); 
                
                window.location.href = "base/p1.html";
            } else {
                alert("Usuário ou senha incorretos!");
                btnEntrar.innerText = "Login";
                btnEntrar.disabled = false;
            }
        } catch (error) {
            console.error("Erro ao conectar com o banco:", error);
            alert("Erro ao conectar com o servidor. Tente novamente.");
            btnEntrar.innerText = "Login";
            btnEntrar.disabled = false;
        }
    });
</script>
</body>
</html>
