<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - Fórum do DEV</title>
  <link rel="stylesheet" type="text/css" href="main.css">
</head>
<body>
  <div class="wrapper">
    <div class="form-wrapper sign-in">
      <!-- Removi o action para o JS controlar o envio -->
      <form id="loginForm">
        <h2>Login</h2>
        <div class="input-group">
          <input type="text" id="name" required>
          <label>Username</label>
        </div>
        <div class="input-group">
          <input type="password" id="senha" required>
          <label>Password</label>
        </div>
        <div class="remember">
          <label><input type="checkbox"> Remember me</label>
        </div>
        <button type="submit" id="btn-entrar">Login</button>
      </form>
    </div>
  </div>

<script>
// 1. Configurações Iniciais
const API_URL = 'https://sheetdb.io/api/v1/et92hg0rvu16i';
const loginForm = document.getElementById('loginForm');
const btnEntrar = document.getElementById('btn-entrar');

// 2. Evento de Envio do Formulário
loginForm.addEventListener('submit', async (e) => {
    e.preventDefault(); 

    const userField = document.getElementById('name').value.trim();
    const passField = document.getElementById('senha').value.trim();

    btnEntrar.innerText = "Verificando...";
    btnEntrar.disabled = true;

    try {
        const response = await fetch(API_URL);
        
        if (!response.ok) throw new Error("Erro ao acessar a planilha");

        const usuarios = await response.json();

        // 3. Validação (Corrigida para usar 'u.name' e 'u.senha')
        const usuarioAchado = usuarios.find(u => {
            const nomePlanilha = u.name ? u.name.toString().trim() : "";
            const senhaPlanilha = u.senha ? u.senha.toString().trim() : "";
            return nomePlanilha === userField && senhaPlanilha === passField;
        });

        if (usuarioAchado) {
            // AQUI ESTAVA O ERRO: Usamos 'usuarioAchado' em todos os campos
            sessionStorage.setItem('logado', 'true');
            sessionStorage.setItem('idUsuario', usuarioAchado.id); // Salva o ID (Ex: 89)
            sessionStorage.setItem('nomeUsuario', usuarioAchado.name); 

            console.log("ID salvo:", usuarioAchado.id);
            
            // Pequeno delay para garantir que o navegador salvou os dados
            setTimeout(() => {
                window.location.href = "base/p1.html";
            }, 100);

        } else {
            alert("Usuário ou senha incorretos!");
        }

    } catch (error) {
        console.error("Erro na conexão:", error);
        alert("Erro ao conectar com o banco de dados. Verifique sua internet.");
    } finally {
        btnEntrar.innerText = "Login";
        btnEntrar.disabled = false;
    }
});
</script>
</body>
</html>
