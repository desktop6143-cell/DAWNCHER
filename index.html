<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - Fórum do DEV</title>
  <link rel="stylesheet" type="text/css" href="main.css">
</head>
<body>
  <div class="wrapper">
    <div class="form-wrapper sign-in">
      <!-- Removi o action para o JS controlar o envio -->
      <form id="loginForm">
        <h2>Login</h2>
        <div class="input-group">
          <input type="text" id="name" required>
          <label>Username</label>
        </div>
        <div class="input-group">
          <input type="password" id="senha" required>
          <label>Password</label>
        </div>
        <div class="remember">
          <label><input type="checkbox"> Remember me</label>
        </div>
        <button type="submit" id="btn-entrar">Login</button>
      </form>
    </div>
  </div>

<script>
// 1. CONFIGURAÇÕES E SEGURANÇA
const API_ID = 'et92hg0rvu16i'; 
// AQUI ESTAVA O ERRO: Use crases (tecla ao lado do P ou Shift + ´) para o ${} funcionar
const BASE_URL = `https://sheetdb.io{API_ID}`; 
const idUsuarioLogado = sessionStorage.getItem('idUsuario');

if (sessionStorage.getItem('logado') !== 'true') {
    window.location.href = "../index.html"; 
}

// 2. CARREGAR HISTÓRICO
async function carregarTudo() {
    const container = document.getElementById('lista-continuar');
    const secao = document.getElementById('secao-continuar');

    // Se o ID for nulo, paramos aqui
    if (!idUsuarioLogado || idUsuarioLogado === "null") {
        console.error("ID do usuário não encontrado.");
        return;
    }

    try {
        // Agora a URL será montada corretamente como: https://sheetdb.io
        const urlFinal = `${BASE_URL}/search?id_user=${idUsuarioLogado}`;
        console.log("Tentando acessar:", urlFinal); // Verifique isso no console!

        const resposta = await fetch(urlFinal);
        
        if (!resposta.ok) throw new Error("Erro ao conectar com a planilha");

        const historico = await resposta.json();

        if (!historico || historico.length === 0 || historico.error) {
            console.log("Nenhum histórico para o usuário:", idUsuarioLogado);
            return;
        }

        secao.style.display = 'block';
        container.innerHTML = ''; 

        // Inverte para mostrar o último visto primeiro
        historico.reverse().forEach(item => {
            if(!item.titulo) return;

            const card = document.createElement('div');
            card.className = 'ep-card';
            
            card.onclick = () => {
                const urlVideo = encodeURIComponent(item.url_acesso || "");
                const nomeTitulo = encodeURIComponent(item.titulo);
                window.location.href = `player.html?url=${urlVideo}&titulo=${nomeTitulo}`;
            };

            card.innerHTML = `
                <div style="font-size: 14px; font-weight: bold; margin-bottom: 5px;">${item.titulo}</div>
                <div class="progresso-bg">
                    <div class="progresso-bar"></div>
                </div>
                <p style="font-size: 11px; color: #aaa; margin-top: 8px;">Visto em: ${item.data || '---'}</p>
            `;
            container.appendChild(card);
        });
    } catch (erro) {
        console.error("Erro na API:", erro);
    }
}

// 3. BOTÕES DA HOTBAR (Mantenha seu código original abaixo)
const acoesBotoes = {
    'btn-sair': () => { sessionStorage.clear(); window.location.href = "../index.html"; },
    'btnBL': () => window.location.href = "bl.html",
    'btnnt': () => window.location.href = "info.html",
    'btnLP': () => window.location.href = "../sites/bar.html"
};

Object.keys(acoesBotoes).forEach(id => {
    const btn = document.getElementById(id);
    if(btn) btn.addEventListener('click', acoesBotoes[id]);
});

window.onload = carregarTudo;
</script>

</body>
</html>
