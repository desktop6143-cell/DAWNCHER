<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title id="page-title">Carregando...</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #0f0f0f;
            color: #fff;
            font-family: Arial, sans-serif;
            overflow: hidden;
        }
        .container {
            width: 100vw;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }
        .header {
            background: #1a1a1a;
            padding: 12px 15px;
            display: flex;
            align-items: center;
            gap: 12px;
            z-index: 10;
        }
        .back-btn {
            background: rgba(255,255,255,0.1);
            border: none;
            color: white;
            font-size: 26px;
            width: 48px;
            height: 48px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
        }
        .titulo {
            flex: 1;
            font-size: 17px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .player-wrapper {
            flex: 1;
            position: relative;
            background: #000;
        }
        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }
        .aviso {
            position: absolute;
            bottom: 15px;
            left: 15px;
            right: 15px;
            background: rgba(231, 76, 60, 0.92);
            color: white;
            padding: 12px 15px;
            border-radius: 8px;
            font-size: 14.5px;
            text-align: center;
            z-index: 30;
            display: none;
            cursor: pointer;
        }
        .loading {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 20;
            text-align: center;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <button class="back-btn" onclick="window.history.back()">←</button>
        <div class="titulo" id="titulo-player">Carregando vídeo...</div>
    </div>

    <div class="player-wrapper">
        <div class="loading" id="loading">
            <p>🔄 Carregando vídeo...</p>
        </div>

        <iframe id="video-player" allowfullscreen allow="autoplay; encrypted-media; picture-in-picture; fullscreen"></iframe>

        <div class="aviso" id="aviso">
            ⚠️ Player não carregou?<br>
            <strong>Toque aqui para abrir direto no host</strong>
        </div>
    </div>
</div>

<script>
// ==================== PEGA PARÂMETROS ====================
const params = new URLSearchParams(window.location.search);
const urlVideo = params.get('url');
const tituloRaw = params.get('titulo');

// Elementos
const tituloEl = document.getElementById('titulo-player');
const iframe = document.getElementById('video-player');
const aviso = document.getElementById('aviso');
const loading = document.getElementById('loading');

// ==================== INICIALIZAÇÃO ====================
if (tituloRaw) {
    const titulo = decodeURIComponent(tituloRaw);
    tituloEl.textContent = titulo;
    document.title = titulo;
}

if (urlVideo) {
    let link = decodeURIComponent(urlVideo).trim();

    // Converte automaticamente links comuns para embed
    if (link.includes("mega.nz/file/")) {
        link = link.replace("mega.nz/file/", "mega.nz/embed/");
    }
    if (link.includes("mixdrop.co/f/")) {
        link = link.replace("mixdrop.co/f/", "mixdrop.co/e/");
    }

    iframe.src = link;

    // Esconde loading
    setTimeout(() => {
        loading.style.display = "none";
    }, 3000);

} else {
    tituloEl.textContent = "❌ Erro: Nenhum link encontrado";
}

// ==================== AVISO MOBILE (8 segundos) ====================
function mostrarAviso() {
    if (window.innerWidth <= 768) {
        aviso.style.display = "block";
        
        setTimeout(() => {
            aviso.style.transition = "opacity 0.6s";
            aviso.style.opacity = "0";
            setTimeout(() => aviso.style.display = "none", 700);
        }, 8000);
    }
}

setTimeout(mostrarAviso, 2500);

// ==================== ABRIR NO HOST ORIGINAL ====================
aviso.addEventListener('click', () => {
    if (urlVideo) {
        window.open(decodeURIComponent(urlVideo), '_blank');
    }
});

// Clique duplo no player também abre no host
iframe.addEventListener('dblclick', () => {
    if (urlVideo) window.open(decodeURIComponent(urlVideo), '_blank');
});
</script>

</body>
</html>
