<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ERRO 404 - IDENTIDADE NÃO RECONHECIDA</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #0a0a0a;
            color: white;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            text-align: center;
        }

        .container {
            position: relative;
            padding: 40px;
            border: 2px solid #e74c3c;
            background: rgba(231, 76, 60, 0.05);
            box-shadow: 0 0 20px rgba(231, 76, 60, 0.2);
            max-width: 600px;
        }

        /* Cantoneiras Estilo Anime */
        .container::before {
            content: ""; position: absolute; top: -10px; left: -10px;
            width: 30px; height: 30px; border-top: 5px solid #00ffcc; border-left: 5px solid #00ffcc;
        }
        .container::after {
            content: ""; position: absolute; bottom: -10px; right: -10px;
            width: 30px; height: 30px; border-bottom: 5px solid #00ffcc; border-right: 5px solid #00ffcc;
        }

        h1 {
            font-size: 80px;
            color: #e74c3c;
            margin-bottom: 10px;
            letter-spacing: 10px;
            text-shadow: 3px 3px 0px #000;
        }

        h2 {
            text-transform: uppercase;
            letter-spacing: 3px;
            margin-bottom: 20px;
            color: #fff;
        }

        p {
            color: #888;
            margin-bottom: 30px;
            line-height: 1.6;
        }

        .btn-voltar {
            display: inline-block;
            background: #00ffcc;
            color: #000;
            text-decoration: none;
            padding: 12px 40px;
            font-weight: bold;
            text-transform: uppercase;
            transition: 0.3s;
            border-radius: 2px;
        }

        .btn-voltar:hover {
            background: #e74c3c;
            color: white;
            box-shadow: 0 0 15px #e74c3c;
        }

        /* Efeito de Glitch leve */
        .glitch {
            animation: glitch 1s linear infinite;
        }

        @keyframes glitch {
            2%, 64% { transform: translate(2px, 0) skew(0deg); }
            4%, 60% { transform: translate(-2px, 0) skew(0deg); }
            62% { transform: translate(0, 0) skew(5deg); }
        }
    </style>
</head>
<body>

    <div class="container">
        <h1 class="glitch">404</h1>
        <h2>Acesso Negado</h2>
        <p>
            O conteúdo que você está tentando acessar foi movido, <br>
            removido ou nunca existiu em nossa base de dados.
        </p>
        
        <!-- Altere o href para a sua página principal -->
        <a href="../base/bl.html" class="btn-voltar">Retornar à Base</a>
    </div>

</body>
</html>
