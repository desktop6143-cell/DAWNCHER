<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel de Animes</title>
    <link rel="stylesheet" href="p1.css">
    <style>
        #lista-continuar { display: flex; gap: 15px; overflow-x: auto; padding: 10px; scrollbar-width: thin; }
        .ep-card { min-width: 200px; background: #222; border-radius: 8px; cursor: pointer; color: white; padding: 15px; border: 1px solid #444; transition: 0.3s; }
        .ep-card:hover { border-color: #7c3aed; transform: translateY(-3px); }
        .progresso-bg { background: #333; height: 5px; width: 100%; margin-top: 10px; border-radius: 3px; }
        .progresso-bar { background: #7c3aed; height: 100%; width: 100%; border-radius: 3px; }
        
        /* Estilo básico para a Hotbar caso o CSS falhe */
        .hotbar-container { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); display: flex; background: rgba(0,0,0,0.8); padding: 10px; border-radius: 15px; gap: 10px; }
        .hotbar-item { width: 40px; height: 40px; background: #333; border-radius: 10px; cursor: pointer; }
    </style>
</head>
<body>

<section id="secao-continuar" style="display: none; margin: 20px;">
    <h2 style="color: white; font-family: sans-serif; margin-bottom: 15px;">Continuar Assistindo</h2>
    <div id="lista-continuar"></div>
</section>

<div class="hotbar-container">
    <div class="hotbar-item" title="casa" id="btn-home"></div>
    <div class="hotbar-item" title="biblioteca" id="btnBL"></div>
    <div class="hotbar-item" title="pesquisa" id="btnLP"></div>
    <div class="hotbar-item" title="informação" id="btnnt"></div>
    <div class="hotbar-item" title="sair" id="btn-sair"></div>
</div>

<script>
// ==================== CONFIGURAÇÕES ====================
const API_HISTORICO = 'https://script.google.com/macros/s/AKfycbzIp-l5tjnJgmDVDYejfUNsJprl6itVxEpdZKQGoNf9wWrrylQk0wcNivMqbkJjunXmNA/exec';
const idUser = sessionStorage.getItem('idUsuario');
//url fk
// Proteção de Login
if (sessionStorage.getItem('logado') !== 'true' || !idUser) {
    window.location.href = "../index.html";
}

// ==================== FUNÇÃO CARREGAR HISTÓRICO ====================
async function carregarHistorico() {
    const secao = document.getElementById('secao-continuar');
    const container = document.getElementById('lista-continuar');

    console.log("Iniciando busca de histórico para o ID:", idUser);

    try {
       const response = await fetch(API_HISTORICO, {
            method: 'POST',
            redirect: 'follow', // Adicione esta linha
            headers: { 'Content-Type': 'text/plain;charset=utf-8' },
            body: JSON.stringify({
                action: "buscar",
                id_user: idUser
            })
        });

        if (!response.ok) throw new Error("Erro na resposta da rede");

        const dados = await response.json();
        console.log("📊 Dados retornados pela API:", dados);

        if (dados.status === "error") {
            console.error("Erro no Servidor:", dados.message);
            return;
        }

        if (Array.isArray(dados) && dados.length > 0) {
            const ultimo = dados[0]; // Pega o mais recente

            const card = document.createElement('div');
            card.className = 'ep-card';
            card.style.minWidth = '280px';
            
            card.innerHTML = `
                <div style="font-weight: bold; font-size: 16px; margin-bottom: 4px; color: #fff;">
                    ${ultimo.titulo || 'Sem título'}
                </div>
                <div style="font-size: 13px; color: #7c3aed; font-weight: bold; margin-bottom: 10px;">
                    Episódio: ${ultimo.episodio || '1'}
                </div>
                <div class="progresso-bg">
                    <div class="progresso-bar" style="width: 100%;"></div>
                </div>
                <div style="display: flex; justify-content: space-between; margin-top: 10px; font-size: 11px; color: #888;">
                    <span>${ultimo.data || ''}</span>
                    <span>${ultimo.tempo || ''}</span>
                </div>
            `;

            card.onclick = () => {
                if (ultimo.url_acesso) {
                    window.location.href = ultimo.url_acesso;
                } else {
                    alert("URL de acesso não encontrada.");
                }
            };

            container.innerHTML = '';
            container.appendChild(card);
            secao.style.display = 'block';
        } else {
            console.log("Nenhum histórico para o ID:", idUser);
            secao.style.display = 'none';
        }
    } catch (err) {
        console.error("Erro ao carregar histórico:", err);
        secao.style.display = 'none';
    }
}

// ==================== INICIALIZAÇÃO ÚNICA ====================
document.addEventListener('DOMContentLoaded', () => {
    // 1. Carrega os dados da planilha
    carregarHistorico();

    // 2. Configura todos os botões de uma vez
    const configuracoesBotoes = {
        'btn-home': () => window.location.reload(),
        'btnBL':   () => window.location.href = "bl.html",
        'btnLP':   () => window.location.href = "../sites/bar.html",
        'btnnt':   () => window.location.href = "info.html",
        'btn-sair': () => { 
            sessionStorage.clear(); 
            window.location.href = "../index.html"; 
        }
    };

    // Aplica os cliques apenas se o elemento existir no HTML
    Object.keys(configuracoesBotoes).forEach(id => {
        const elemento = document.getElementById(id);
        if (elemento) {
            elemento.onclick = configuracoesBotoes[id];
        }
    });
});
</script>
</body>
</html>
