<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel de Animes</title>
    <link rel="stylesheet" href="p1.css">
    <style>
        #lista-continuar { display: flex; gap: 15px; overflow-x: auto; padding: 10px; scrollbar-width: thin; }
        .ep-card { min-width: 200px; background: #222; border-radius: 8px; cursor: pointer; color: white; padding: 15px; border: 1px solid #444; transition: 0.3s; }
        .ep-card:hover { border-color: #7c3aed; transform: translateY(-3px); }
        .progresso-bg { background: #333; height: 5px; width: 100%; margin-top: 10px; border-radius: 3px; }
        .progresso-bar { background: #7c3aed; height: 100%; width: 100%; border-radius: 3px; }
        
        /* Estilo básico para a Hotbar caso o CSS falhe */
        .hotbar-container { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); display: flex; background: rgba(0,0,0,0.8); padding: 10px; border-radius: 15px; gap: 10px; }
        .hotbar-item { width: 40px; height: 40px; background: #333; border-radius: 10px; cursor: pointer; }
    </style>
</head>
<body>

<section id="secao-continuar" style="display: none; margin: 20px;">
    <h2 style="color: white; font-family: sans-serif; margin-bottom: 15px;">Continuar Assistindo</h2>
    <div id="lista-continuar"></div>
</section>

<div class="hotbar-container">
    <div class="hotbar-item" title="casa" id="btn-home"></div>
    <div class="hotbar-item" title="biblioteca" id="btnBL"></div>
    <div class="hotbar-item" title="pesquisa" id="btnLP"></div>
    <div class="hotbar-item" title="informação" id="btnnt"></div>
    <div class="hotbar-item" title="sair" id="btn-sair"></div>
</div>

<script>
const API_ID_HISTORICO = 'b8bvlm2gypqd0'; 
const BASE_URL = `https://sheetdb.io{API_ID_HISTORICO}`;
// Proteção de segurança
if (sessionStorage.getItem('logado') !== 'true') {
    window.location.href = "../index.html"; 
}

// 2. FUNÇÃO DO HISTÓRICO
async function carregarTudo() {
    const container = document.getElementById('lista-continuar');
    const secao = document.getElementById('secao-continuar');

    if (!idUsuarioLogado) return;

    try {
        const resposta = await fetch(`${BASE_URL}/search?id_user=${idUsuarioLogado}`);
        const historico = await resposta.json();

        if (historico && historico.length > 0) {
            secao.style.display = 'block';
            container.innerHTML = '';
            
            historico.reverse().forEach(item => {
                const card = document.createElement('div');
                card.className = 'ep-card';
                card.innerHTML = `
                    <div style="font-weight: bold; color: white;">${item.titulo}</div>
                    <div class="progresso-bg"><div class="progresso-bar" style="width: 100%;"></div></div>
                    <p style="font-size: 11px; color: #aaa; margin-top: 5px;">Visto em: ${item.data}</p>
                `;
                card.onclick = () => {
                    const url = encodeURIComponent(item.url_acesso || "");
                    const tit = encodeURIComponent(item.titulo || "");
                    window.location.href = `player.html?url=${url}&titulo=${tit}`;
                };
                container.appendChild(card);
            });
        }
    } catch (erro) {
        console.error("Erro no histórico:", erro);
    }
}

// 3. BOTÕES DA HOTBAR (REVISADOS)
// Verifique se os IDs no seu HTML são exatamente esses:
const botoes = {
    'btn-sair': () => { sessionStorage.clear(); window.location.href = "../index.html"; },
    'btnBL': () => { window.location.href = "bl.html"; },
    'btnnt': () => { window.location.href = "info.html"; },
    'btnLP': () => { window.location.href = "../sites/bar.html"; }
};

// Vincula os cliques aos botões
Object.keys(botoes).forEach(id => {
    const el = document.getElementById(id);
    if (el) {
        el.style.cursor = "pointer"; // Garante que mostre a "mãozinha"
        el.onclick = botoes[id];
    } else {
        console.warn("Botão não encontrado no HTML: " + id);
    }
});

window.onload = carregarTudo;
</script>
</body>
</html>
