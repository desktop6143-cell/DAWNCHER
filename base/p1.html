<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel de Animes</title>
    <link rel="stylesheet" href="p1.css">
    <style>
        #lista-continuar { display: flex; gap: 15px; overflow-x: auto; padding: 10px; scrollbar-width: thin; }
        .ep-card { min-width: 200px; background: #222; border-radius: 8px; cursor: pointer; color: white; padding: 15px; border: 1px solid #444; transition: 0.3s; }
        .ep-card:hover { border-color: #7c3aed; transform: translateY(-3px); }
        .progresso-bg { background: #333; height: 5px; width: 100%; margin-top: 10px; border-radius: 3px; }
        .progresso-bar { background: #7c3aed; height: 100%; width: 100%; border-radius: 3px; }
        
        /* Estilo básico para a Hotbar caso o CSS falhe */
        .hotbar-container { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); display: flex; background: rgba(0,0,0,0.8); padding: 10px; border-radius: 15px; gap: 10px; }
        .hotbar-item { width: 40px; height: 40px; background: #333; border-radius: 10px; cursor: pointer; }
    </style>
</head>
<body>

<section id="secao-continuar" style="display: none; margin: 20px;">
    <h2 style="color: white; font-family: sans-serif; margin-bottom: 15px;">Continuar Assistindo</h2>
    <div id="lista-continuar"></div>
</section>

<div class="hotbar-container">
    <div class="hotbar-item" title="casa" id="btn-home"></div>
    <div class="hotbar-item" title="biblioteca" id="btnBL"></div>
    <div class="hotbar-item" title="pesquisa" id="btnLP"></div>
    <div class="hotbar-item" title="informação" id="btnnt"></div>
    <div class="hotbar-item" title="sair" id="btn-sair"></div>
</div>

<script>
// ==================== CONFIGURAÇÕES ====================
const API_HISTORICO = 'https://script.google.com/macros/s/AKfycbwfogiAwtuRTgogCtGX6yoc0irLDh2aajBOkpJxrf5T5JAneXvvvpUefRaOMZa8Qzer0w/exec';
const idUser = sessionStorage.getItem('idUsuario');
 // url FIM
if (sessionStorage.getItem('logado') !== 'true' || !idUser) {
    window.location.href = "../index.html";
}

// ====================== BUSCAR (CORRIGIDA) ======================
function buscarHistorico(id_user) {
  try {
    const ss = SpreadsheetApp.getActiveSpreadsheet();
    if (!ss) throw new Error("Não foi possível encontrar a planilha ativa. O script está vinculado?");
    
    const aba = ss.getSheetByName("historico");
    
    // Se a aba não existe ou está vazia
    if (!aba || aba.getLastRow() < 2) {
      return ContentService.createTextOutput(JSON.stringify([])).setMimeType(ContentService.MimeType.JSON);
    }

    const valores = aba.getDataRange().getValues();
    const headers = valores[0].map(h => h.toString().toLowerCase().trim());
    
    // Localiza os índices das colunas de forma segura
    const idxId = headers.indexOf("id_user");
    const idxTitulo = headers.indexOf("titulo");
    const idxUrl = headers.indexOf("url_acesso");
    const idxData = headers.indexOf("data");
    const idxTempo = headers.indexOf("tempo");
    const idxEpi = headers.indexOf("episodio");
    const idxTime = headers.indexOf("timestamp");

    const historico = [];

    for (let i = 1; i < valores.length; i++) {
      const linha = valores[i];
      
      // Verifica se o ID do usuário bate
      if (String(linha[idxId]) === String(id_user)) {
        historico.push({
          id_user: linha[idxId],
          titulo: linha[idxTitulo],
          url_acesso: linha[idxUrl],
          data: linha[idxData],
          tempo: linha[idxTempo],
          episodio: linha[idxEpi],
          timestamp: linha[idxTime] || 0 // ADICIONADO: Necessário para o sort funcionar
        });
      }
    }

    // Ordena pelo timestamp (mais recente primeiro)
    historico.sort((a, b) => b.timestamp - a.timestamp);

    return ContentService.createTextOutput(JSON.stringify(historico))
      .setMimeType(ContentService.MimeType.JSON);

  } catch (e) {
    return ContentService.createTextOutput(JSON.stringify({ status: "error", message: e.toString() }))
      .setMimeType(ContentService.MimeType.JSON);
  }
}

// ==================== BOTÕES ====================
document.getElementById('btn-home').onclick = () => window.location.reload();
document.getElementById('btnBL').onclick = () => window.location.href = "bl.html";
document.getElementById('btnLP').onclick = () => window.location.href = "../sites/bar.html";
document.getElementById('btnnt').onclick = () => window.location.href = "info.html";
document.getElementById('btn-sair').onclick = () => {
    sessionStorage.clear();
    window.location.href = "../index.html";
};

window.onload = carregarHistorico;
</script>
</body>
</html>
