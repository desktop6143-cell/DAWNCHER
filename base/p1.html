<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel de Animes</title>
    <link rel="stylesheet" href="p1.css">
    <style>
        #lista-continuar { display: flex; gap: 15px; overflow-x: auto; padding: 10px; scrollbar-width: thin; }
        .ep-card { min-width: 200px; background: #222; border-radius: 8px; cursor: pointer; color: white; padding: 15px; border: 1px solid #444; transition: 0.3s; }
        .ep-card:hover { border-color: #7c3aed; transform: translateY(-3px); }
        .progresso-bg { background: #333; height: 5px; width: 100%; margin-top: 10px; border-radius: 3px; }
        .progresso-bar { background: #7c3aed; height: 100%; width: 100%; border-radius: 3px; }
        
        /* Estilo básico para a Hotbar caso o CSS falhe */
        .hotbar-container { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); display: flex; background: rgba(0,0,0,0.8); padding: 10px; border-radius: 15px; gap: 10px; }
        .hotbar-item { width: 40px; height: 40px; background: #333; border-radius: 10px; cursor: pointer; }
    </style>
</head>
<body>

<section id="secao-continuar" style="display: none; margin: 20px;">
    <h2 style="color: white; font-family: sans-serif; margin-bottom: 15px;">Continuar Assistindo</h2>
    <div id="lista-continuar"></div>
</section>

<div class="hotbar-container">
    <div class="hotbar-item" title="casa" id="btn-home"></div>
    <div class="hotbar-item" title="biblioteca" id="btnBL"></div>
    <div class="hotbar-item" title="pesquisa" id="btnLP"></div>
    <div class="hotbar-item" title="informação" id="btnnt"></div>
    <div class="hotbar-item" title="sair" id="btn-sair"></div>
</div>

<script>
// ==================== CONFIGURAÇÕES ====================
const API_HISTORICO = 'https://script.google.com/macros/s/AKfycbwWHgy2oHdmZyHZxd-OTUyWPXog5y6jtwrw65KQz7WnEiq50LomYSxW327On6onElJLqQ/exec';
const idUser = sessionStorage.getItem('idUsuario');
 // url kl
// Proteção
if (sessionStorage.getItem('logado') !== 'true' || !idUser) {
    window.location.href = "../index.html";
}

// ==================== CARREGAR "CONTINUAR ASSISTINDO" ====================
async function carregarHistorico() {
    const secao = document.getElementById('secao-continuar');
    const container = document.getElementById('lista-continuar');

    if (!secao || !container) return;

    try {
        const response = await fetch(API_HISTORICO, {
            method: 'POST',
            headers: { 'Content-Type': 'text/plain;charset=utf-8' },
            body: JSON.stringify({
                action: "buscar",
                id_user: idUser
            })
        });

        if (!response.ok) throw new Error("Erro na API");

        let dados = await response.json();

        if (Array.isArray(dados) && dados.length > 0) {
            // Pega o mais recente
            const ultimo = dados[0];

            const card = document.createElement('div');
            card.className = 'ep-card';
            card.innerHTML = `
                <div style="font-weight: bold;">${ultimo.titulo || 'Sem título'}</div>
                <div class="progresso-bg">
                    <div class="progresso-bar" style="width: 65%;"></div>
                </div>
                <p style="font-size: 13px; color: #ccc; margin-top: 8px;">
                    ${ultimo.data || ''} • ${ultimo.tempo || ''} ${ultimo.episodio ? '• ' + ultimo.episodio : ''}
                </p>
            `;

            card.onclick = () => {
                if (ultimo.url_acesso) {
                    window.location.href = ultimo.url_acesso;
                } else {
                    alert("Link do episódio não encontrado.");
                }
            };

            container.innerHTML = '';
            container.appendChild(card);
            secao.style.display = 'block';   // Mostra a seção
        } else {
            secao.style.display = 'none';    // Esconde se não tiver histórico
        }

    } catch (err) {
        console.error("Erro ao carregar histórico:", err);
        secao.style.display = 'none';
    }
}

// ==================== BOTÕES DA HOTBAR ====================
document.getElementById('btn-home').onclick = () => window.location.reload();
document.getElementById('btnBL').onclick = () => window.location.href = "bl.html";
document.getElementById('btnLP').onclick = () => window.location.href = "../sites/bar.html";
document.getElementById('btnnt').onclick = () => window.location.href = "info.html";
document.getElementById('btn-sair').onclick = () => {
    sessionStorage.clear();
    window.location.href = "../index.html";
};

// Carrega ao abrir a página
window.onload = carregarHistorico;
</script>
</body>
</html>
