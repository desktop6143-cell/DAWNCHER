<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel de Animes</title>
    <link rel="stylesheet" href="p1.css">
    <style>
        /* Estilo rápido para organizar a seção */
        #lista-continuar { display: flex; gap: 15px; overflow-x: auto; padding: 10px; }
        .ep-card { min-width: 200px; background: #222; border-radius: 8px; cursor: pointer; color: white; padding: 10px; border: 1px solid #444; }
        .progresso-bg { background: #555; height: 5px; width: 100%; margin-top: 10px; border-radius: 3px; }
        .progresso-bar { background: red; height: 100%; width: 50%; border-radius: 3px; }
    </style>
</head>
<body>

<!-- SEÇÃO CONTINUAR ASSISTINDO -->
<section id="secao-continuar" style="display: none; margin: 20px;">
    <h2 style="color: white; font-family: sans-serif;">Continuar Assistindo</h2>
    <div id="lista-continuar"></div>
</section>

<div class="hotbar-container">
    <div class="hotbar-item" title="casa"></div>
    <div class="hotbar-item" title="biblioteca" id="btnBL"></div>
    <div class="hotbar-item" title="pesquisa" id="btnLP"></div>
    <div class="hotbar-item" title="informação" id="btnnt"></div>
    <div class="hotbar-item" title="sair" id="btn-sair"></div>
</div>

<script>
// 1. CONFIGURAÇÕES E VERIFICAÇÃO DE LOGIN
const API_ID = 'et92hg0rvu16i'; 
const BASE_URL = `https://sheetdb.io{API_ID}`;
const idUsuarioLogado = sessionStorage.getItem('idUsuario');

// CORREÇÃO: Só expulsa se NÃO estiver logado. 
// Se estiver logado, o código segue normalmente.
if (sessionStorage.getItem('logado') !== 'true') {
    window.location.href = "../index.html"; 
}

// 2. CARREGAR HISTÓRICO DA PLANILHA
async function carregarTudo() {
    const container = document.getElementById('lista-continuar');
    const secao = document.getElementById('secao-continuar');

    // Se por algum motivo o ID for nulo, paramos aqui para não dar erro na URL
    if (!idUsuarioLogado) return;

    try {
        const resposta = await fetch(`${BASE_URL}/search?id_user=${idUsuarioLogado}`);
        
        if (!resposta.ok) throw new Error("Erro na resposta da API");

        const historico = await resposta.json();

        // Se não tiver histórico, apenas não mostramos a seção "Continuar Assistindo"
        if (!historico || historico.length === 0 || historico.error) {
            console.log("Nenhum histórico encontrado.");
            return;
        }

        if(secao) secao.style.display = 'block';
        if(container) container.innerHTML = ''; 

        // Inverte para o mais recente aparecer primeiro
        historico.reverse().forEach(item => {
            if(!item.titulo) return;

            const card = document.createElement('div');
            card.className = 'ep-card';
            
            card.onclick = () => {
                const urlVideo = encodeURIComponent(item.url_acesso || "");
                const nomeTitulo = encodeURIComponent(item.titulo);
                window.location.href = `player.html?url=${urlVideo}&titulo=${nomeTitulo}`;
            };

            card.innerHTML = `
                <div style="font-size: 14px; font-weight: bold; margin-bottom: 5px; color: white;">${item.titulo}</div>
                <div class="progresso-bg" style="background: #333; height: 4px; border-radius: 2px;">
                    <div class="progresso-bar" style="background: #7c3aed; width: 100%; height: 100%;"></div>
                </div>
                <p style="font-size: 11px; color: #aaa; margin-top: 5px;">Visto em: ${item.data || 'Recentemente'}</p>
            `;
            container.appendChild(card);
        });
    } catch (erro) {
        console.error("Erro ao carregar histórico:", erro);
    }
}

// 3. BOTÕES DA HOTBAR
const acoesBotoes = {
    'btn-sair': () => { sessionStorage.clear(); window.location.href = "../index.html"; },
    'btnBL': () => window.location.href = "bl.html",
    'btnnt': () => window.location.href = "info.html",
    'btnLP': () => window.location.href = "../sites/bar.html"
};

Object.keys(acoesBotoes).forEach(id => {
    const btn = document.getElementById(id);
    if(btn) btn.addEventListener('click', acoesBotoes[id]);
});

window.onload = carregarTudo;
</script>

</body>
</html>
