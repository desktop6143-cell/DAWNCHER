    <script>

    // Função para carregar os dados do arquivo JSON local
    async function carregarCards() {
        const container = document.querySelector('.cards-container');
        
        try {
            // Busca o arquivo local
            const resposta = await fetch('../database/filmes.json');
            
            if (!resposta.ok) throw new Error("Arquivo não encontrado");
            
            const dados = await resposta.json();

            container.innerHTML = ""; // Limpa o "carregando"

            dados.forEach(item => {
                const cardHTML = `
                    <div class="card" data-href="${item.href}">
                        <div class="box-item" style="background-image: url('${item.foto}');"></div>
                        <p class="box-title">${item.titulo}</p>
                    </div>
                `;
                container.innerHTML += cardHTML;
            });

        } catch (erro) {
            console.error("Erro:", erro);
            container.innerHTML = "<p style='color:white;'>Erro ao carregar dados. Verifique se o arquivo dados.json existe.</p>";
        }
    }

    // Inicia a carga
    carregarCards();

    // Evento de Clique nos cards
    document.addEventListener('click', (e) => {
        const card = e.target.closest('.card');
        if (card) {
            const href = card.getAttribute('data-href');
            if (href) window.location.href = href;
        }
    });

// 3. BOTÕES DA HOTBAR
document.getElementById('btn-sair').addEventListener('click', () => {
    sessionStorage.removeItem('logado'); 
    window.location.href = "../index.html"; 
});

document.getElementById('btnhm').addEventListener('click', () => window.location.href = "p1.HTML");

document.getElementById('btnnt').addEventListener('click', () => window.location.href = "info.html");
document.getElementById('btnLP').addEventListener('click', () => window.location.href = "../SITES/bar.html");

// Inicializa a página

</script>
