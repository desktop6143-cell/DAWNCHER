<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Informações</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
   
    <style>
        //========hotbar icons============
        .hotbar-item:hover {
    background-color: #3498db;
    border-color: #fff;
    transform: scale(1.1) translateY(-5px); /* sobe um pouquinho */
}
.hotbar-item:nth-child(1) { 
    background-image: url('../pngs/inicio.png');
    background-size: contain;
    background-repeat: no-repeat;
    background-position: center;
}
.hotbar-item:nth-child(2) { 
    background-image: url('../pngs/play.jpg');
    background-size: contain;
    background-repeat: no-repeat;
    background-position: center;
}
.hotbar-item:nth-child(3) { 
    background-image: url('../pngs/lupa1.png');
    background-size: contain;
    background-repeat: no-repeat;
    background-position: center;
}
.hotbar-item:nth-child(4) { 
    background-image: url('../pngs/info.png');
    background-size: contain;
    background-repeat: no-repeat;
    background-position: center;
}
.hotbar-item:nth-child(5) { 
    background-image: url('../pngs/sair.png');
    background-size: contain;
    background-repeat: no-repeat;
    background-position: center;
}
        ///===========================
        :root {
            --accent: #7c3aed;
            --accent-glow: rgba(124, 58, 237, 0.3);
            --glass: rgba(15, 23, 42, 0.75);
            --border: rgba(255, 255, 255, 0.1);
            --text-sec: #94a3b8;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', system-ui, sans-serif; }

        body {
            background: #0f172a url('../pngs/png3.jpg') no-repeat center center fixed;
            background-size: cover;
            color: white;
            min-height: 100vh;
            overflow-x: hidden;
            display: flex;
            flex-direction: column;
        }

        .blob {
            position: fixed;
            width: 400px;
            height: 400px;
            background: var(--accent);
            filter: blur(100px);
            border-radius: 50%;
            opacity: 0.15;
            z-index: -1;
            animation: move 20s infinite alternate;
        }
        .blob.pink { background: #c026d3; right: 0; bottom: 0; animation-delay: -5s; }
        @keyframes move {
            from { transform: translate(-10%, -10%); }
            to { transform: translate(20%, 20%); }
        }

        main { flex: 1; padding: 40px; max-width: 1200px; margin: 0 auto; width: 100%; padding-bottom: 140px; }

        header h1 {
            font-weight: 300;
            margin-bottom: 35px;
            font-size: 2.3rem;
        }
        header h1 span { font-weight: 800; color: var(--accent); }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px;
            margin-bottom: 50px;
        }
        .card {
            background: var(--glass);
            backdrop-filter: blur(16px);
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 24px;
            transition: all 0.3s;
        }
        .card:hover {
            transform: translateY(-6px);
            border-color: var(--accent);
            box-shadow: 0 15px 30px var(--accent-glow);
        }
        .card-main { grid-column: span 2; }

        .stat-label {
            color: var(--text-sec);
            font-size: 0.95rem;
            margin-bottom: 10px;
            font-weight: 600;
        }
        .stat-value { font-size: 2rem; font-weight: 800; letter-spacing: -1px; }

        /* === DOWNLOADS === */
        .downloads-section {
            background: var(--glass);
            backdrop-filter: blur(16px);
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 30px;
        }
        .downloads-section h2 {
            margin-bottom: 25px;
            color: var(--accent);
        }
        .btn-download {
            display: flex;
            align-items: center;
            gap: 18px;
            padding: 20px 24px;
            background: rgba(30, 30, 40, 0.9);
            border: 1px solid var(--border);
            border-radius: 16px;
            color: white;
            text-decoration: none;
            margin-bottom: 16px;
            transition: all 0.3s;
        }
        .btn-download:hover {
            background: var(--accent);
            transform: translateY(-4px);
        }

        /* Hotbar */
        .hotbar-container {
            position: fixed;
            bottom: 25px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.85);
            padding: 12px;
            border-radius: 20px;
            display: flex;
            gap: 12px;
            border: 1px solid var(--border);
            backdrop-filter: blur(12px);
            z-index: 1000;
        }
        .hotbar-item {
            width: 54px;
            height: 54px;
            border-radius: 14px;
            background-color: rgba(255, 255, 255, 0.05);
            background-size: 26px;
            background-repeat: no-repeat;
            background-position: center;
            cursor: pointer;
            transition: 0.3s;
        }
        .hotbar-item:hover {
            background-color: var(--accent);
            transform: translateY(-5px) scale(1.08);
        }
    </style>
</head>
<body>

    <div class="blob"></div>
    <div class="blob pink"></div>

    <!-- HOTBAR -->
    <nav class="hotbar-container">
        <div class="hotbar-item" title="Início" id="btn-home"></div>
        <div class="hotbar-item" title="Biblioteca" id="btn-library"></div>
        <div class="hotbar-item" title="Pesquisa" id="btn-search"></div>
        <div class="hotbar-item" title="Informação" id="btn-info"></div>
        <div class="hotbar-item" title="Sair" id="btn-exit"></div>
    </nav>

    <main>
        <header>
            <h1>Bem-vindo, <span>Fórum do DEV</span></h1>
        </header>

        <section class="grid">
            <div class="card">
                <span class="stat-label"><i class="fas fa-code-branch"></i> Versão Atual</span>
                <div class="stat-value">1.0.5</div>
            </div>
            <div class="card">
                <span class="stat-label"><i class="fas fa-chart-line"></i> Progressão</span>
                <div class="stat-value">13.5%</div>
            </div>
            <div class="card">
                <span class="stat-label" style="color: #fb7185;"><i class="fas fa-bell"></i> Alertas</span>
                <div class="stat-value">03</div>
            </div>
            <div class="card">
                <span class="stat-label"><i class="fas fa-stopwatch"></i> Tempo de Uso</span>
                <div id="tempo-display" class="stat-value">0d 00:00:00</div>
            </div>
            <div class="card card-main">
                <span class="stat-label"><i class="fas fa-history"></i> Histórico</span>
                <p class="stat-desc">Seu histórico de atividades aparecerá aqui em breve.</p>
            </div>
        </section>

        <!-- DOWNLOADS -->
        <section class="downloads-section">
            <h2><i class="fas fa-download"></i> Downloads Dawncher</h2>
            
            <a href="https://www.mediafire.com/file/aj8epr782z3c3vs/Dawncher_Celular.apk/file" 
               class="btn-download" target="_blank">
                <i class="fas fa-mobile-alt fa-2x"></i>
                <div>
                    <strong>APK - Celular</strong><br>
                    <small>Dawncher para Smartphone</small>
                </div>
            </a>

            <a href="https://www.mediafire.com/file/4we1xqa6tilt034/Dawncher_Tv.apk/file" 
               class="btn-download" target="_blank">
                <i class="fas fa-tv fa-2x"></i>
                <div>
                    <strong>APK - TV Box</strong><br>
                    <small>Dawncher para Smart TV / TV Box</small>
                </div>
            </a>
        </section>
    </main>

    <script>
        if (sessionStorage.getItem('logado') !== 'true') {
            window.location.href = "../index.html";
        }

        const rotas = {
            'btn-exit': () => { sessionStorage.removeItem('logado'); window.location.href = "../index.html"; },
            'btn-library': () => window.location.href = "bl.html",
            'btn-home': () => window.location.href = "p1.html",
            'btn-search': () => window.location.href = "../sites/bar.html"
        };

        Object.keys(rotas).forEach(id => {
            const botao = document.getElementById(id);
            if (botao) botao.addEventListener('click', rotas[id]);
        });

        // Cronômetro
        let dataInicio = localStorage.getItem('data_inicio_uso');
        if (!dataInicio) {
            dataInicio = Date.now();
            localStorage.setItem('data_inicio_uso', dataInicio);
        }
        const display = document.getElementById('tempo-display');
        function atualizarTempoReal() {
            const agora = Date.now();
            const diferenca = Math.floor((agora - dataInicio) / 1000);
            const dias = Math.floor(diferenca / 86400);
            const horas = Math.floor((diferenca % 86400) / 3600).toString().padStart(2, '0');
            const minutos = Math.floor((diferenca % 3600) / 60).toString().padStart(2, '0');
            const segundos = (diferenca % 60).toString().padStart(2, '0');
            display.innerText = `${dias}d ${horas}:${minutos}:${segundos}`;
        }
        setInterval(atualizarTempoReal, 1000);
        atualizarTempoReal();
    </script>
</body>
</html>
