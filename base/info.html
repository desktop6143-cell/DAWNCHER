<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Informações</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
   
    <style>
        :root {
            --accent: #7c3aed;
            --accent-glow: rgba(124, 58, 237, 0.3);
            --glass: rgba(15, 23, 42, 0.75);
            --border: rgba(255, 255, 255, 0.1);
            --text-sec: #94a3b8;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', 'Segoe UI', system-ui, sans-serif;
        }

        body {
            background: #0f172a url('../pngs/png3.jpg') no-repeat center center fixed;
            background-size: cover;
            color: white;
            min-height: 100vh;
            overflow-x: hidden;
            display: flex;
            flex-direction: column;
        }

        .blob {
            position: fixed;
            width: 400px;
            height: 400px;
            background: var(--accent);
            filter: blur(100px);
            border-radius: 50%;
            opacity: 0.15;
            z-index: -1;
            animation: move 20s infinite alternate;
        }
        .blob.pink { background: #c026d3; right: 0; bottom: 0; animation-delay: -5s; }
        @keyframes move {
            from { transform: translate(-10%, -10%); }
            to { transform: translate(20%, 20%); }
        }

        main {
            flex: 1;
            padding: 40px;
            max-width: 1200px;
            margin: 0 auto;
            width: 100%;
            padding-bottom: 120px;
        }

        h1 {
            font-weight: 300;
            margin-bottom: 30px;
            font-size: 2.2rem;
        }
        h1 span { font-weight: 800; color: var(--accent); }

        .downloads-section {
            margin-top: 40px;
        }

        .downloads-section h2 {
            margin-bottom: 20px;
            color: var(--accent);
            font-size: 1.5rem;
        }

        .btn-download {
            display: flex;
            align-items: center;
            gap: 15px;
            padding: 18px 24px;
            background: var(--glass);
            backdrop-filter: blur(16px);
            border: 1px solid var(--border);
            border-radius: 16px;
            color: white;
            text-decoration: none;
            font-size: 1.1rem;
            margin-bottom: 16px;
            transition: all 0.3s;
        }

        .btn-download:hover {
            transform: translateY(-5px);
            border-color: var(--accent);
            box-shadow: 0 10px 25px var(--accent-glow);
        }

        .btn-download i {
            font-size: 1.8rem;
        }

        /* Hotbar */
        .hotbar-container {
            position: fixed;
            bottom: 25px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.8);
            padding: 10px;
            border-radius: 20px;
            display: flex;
            gap: 12px;
            border: 1px solid var(--border);
            backdrop-filter: blur(12px);
            z-index: 1000;
        }
        .hotbar-item {
            width: 52px;
            height: 52px;
            border-radius: 14px;
            background-color: rgba(255, 255, 255, 0.05);
            background-size: 24px;
            background-repeat: no-repeat;
            background-position: center;
            cursor: pointer;
            transition: 0.3s;
        }
        .hotbar-item:hover {
            background-color: var(--accent);
            transform: translateY(-5px) scale(1.05);
        }
    </style>
</head>
<body>

    <div class="blob"></div>
    <div class="blob pink"></div>

    <nav class="hotbar-container">
        <div class="hotbar-item" title="Início" id="btn-home"></div>
        <div class="hotbar-item" title="Biblioteca" id="btn-library"></div>
        <div class="hotbar-item" title="Pesquisa" id="btn-search"></div>
        <div class="hotbar-item" title="Informação" id="btn-info"></div>
        <div class="hotbar-item" title="Sair" id="btn-exit"></div>
    </nav>

    <main>
        <header>
            <h1>Informações <span>&amp; Downloads</span></h1>
        </header>

        <section class="downloads-section">
            <h2><i class="fas fa-download"></i> Downloads do Dawncher</h2>
            
            <a href="https://www.mediafire.com/file/aj8epr782z3c3vs/Dawncher_Celular.apk/file" 
               class="btn-download" target="_blank">
                <i class="fas fa-mobile-alt"></i>
                <div>
                    <strong>APK - Celular</strong><br>
                    <small>Dawncher para Smartphone</small>
                </div>
            </a>

            <a href="https://www.mediafire.com/file/4we1xqa6tilt034/Dawncher_Tv.apk/file" 
               class="btn-download" target="_blank">
                <i class="fas fa-tv"></i>
                <div>
                    <strong>APK - TV Box</strong><br>
                    <small>Dawncher para Smart TV / TV Box</small>
                </div>
            </a>
        </section>
    </main>

    <script>
        // Segurança
        if (sessionStorage.getItem('logado') !== 'true') {
            window.location.href = "../index.html";
        }

        // Navegação Hotbar
        const rotas = {
            'btn-exit': () => {
                sessionStorage.removeItem('logado');
                window.location.href = "../index.html";
            },
            'btn-library': () => window.location.href = "bl.html",
            'btn-home': () => window.location.href = "p1.html",
            'btn-search': () => window.location.href = "../sites/bar.html"
        };

        Object.keys(rotas).forEach(id => {
            const botao = document.getElementById(id);
            if (botao) botao.addEventListener('click', rotas[id]);
        });
    </script>
</body>
</html>
