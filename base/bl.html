<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minha Biblioteca</title>
    <link rel="stylesheet" href="bl.css">
</head>
<body>

    <div class="cards-container"></div> 

    <div class="hotbar-container">
        <div class="hotbar-item" title="Início" id="home"></div>
        <div class="hotbar-item" title="Biblioteca" id="vazio"></div>
        <div class="hotbar-item" title="Pesquisa" id="pqs"></div>
        <div class="hotbar-item" title="Informação" id="info"></div>
        <div class="hotbar-item" title="Sair" id="sair"></div>
    </div>

<script>
// ==================== segurança ====================
if (sessionStorage.getItem('logado') !== 'true') {
    window.location.href = "../index.html";
}

// ==================== Configuração dos botões ====================
const configuracoesBotoes = {
    'home': () => window.location.href = "p1.html",
    'pqs': () => window.location.href = "../sites/bar.html",
    'info': () => window.location.href = "info.html",
    'sair': () => {
        sessionStorage.clear();
        window.location.href = "../index.html";
    }
};

// ==================== Aplicar cliques nos botões ====================
function inicializarBotoes() {
    Object.keys(configuracoesBotoes).forEach(id => {
        const botao = document.getElementById(id);
        if (botao) {
            botao.addEventListener('click', configuracoesBotoes[id]);
        } else {
            console.warn(`Botão com id "${id}" não encontrado!`);
        }
    });
}

// ==================== Carregar cards ====================
async function carregarCards() {
    const container = document.querySelector('.cards-container');
    
    try {
        const resposta = await fetch('../database/dados.json');
        if (!resposta.ok) throw new Error("Arquivo não encontrado");
        
        const dados = await resposta.json();
        container.innerHTML = "";
        
        dados.forEach(item => {
            const cardhtml = `
                <div class="card" data-href="${item.href}">
                    <div class="box-item" style="background-image: url('${item.foto}');"></div>
                    <p class="box-title">${item.titulo}</p>
                </div>
            `;
            container.innerHTML += cardhtml;
        });
    } catch (erro) {
        console.error("Erro:", erro);
        container.innerHTML = "<p style='color:white;'>Erro ao carregar dados.</p>";
    }
}

// ==================== Inicialização ====================
document.addEventListener('DOMContentLoaded', () => {
    carregarCards();
    inicializarBotoes();
});
</script>
</body>
</html>
