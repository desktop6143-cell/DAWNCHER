<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minha Biblioteca</title>
    <link rel="stylesheet" href="bl.css">
</head>
<body>

    <div class="cards-container"></div> <!-- Usando CLASS aqui -->

    <div class="hotbar-container">
        <div class="hotbar-item" title="Início" id="btnhm"></div>
        <div class="hotbar-item" title="Biblioteca" id="btnfl"></div>
        <div class="hotbar-item" title="Pesquisa" id="btnLP"></div>
        <div class="hotbar-item" title="Informação" id="btnnt"></div>
        <div class="hotbar-item" title="Sair" id="btn-sair"></div>
    </div>

<script>
    // SEGURANÇA
    if (sessionStorage.getItem('logado') !== 'true') {
        window.location.href = "../index.html";
    }

    async function carregarCards() {
        const container = document.querySelector('.cards-container');
        
        try {
            const resposta = await fetch('../database/dados.json');
            if (!resposta.ok) throw new Error("Arquivo não encontrado");
            
            const dados = await resposta.json();

            container.innerHTML = ""; // CORRIGIDO: innerHTML com letras maiúsculas

            dados.forEach(item => {
                const cardhtml = `
                    <div class="card" data-href="${item.href}">
                        <div class="box-item" style="background-image: url('${item.foto}');"></div>
                        <p class="box-title">${item.titulo}</p>
                    </div>
                `;
                container.innerHTML += cardhtml; // CORRIGIDO: innerHTML
            });

        } catch (erro) {
            console.error("Erro:", erro);
            container.innerHTML = "<p style='color:white;'>Erro ao carregar dados.</p>";
        }
    }

    // Inicia a carga dos cards
    carregarCards();

    // Evento de Clique nos cards
    document.addEventListener('click', (e) => {
        const card = e.target.closest('.card');
        if (card) {
            const href = card.getAttribute('data-href');
            if (href) window.location.href = href;
        }
    });

    // BOTÕES DA HOTBAR
    document.getElementById('btn-sair').addEventListener('click', () => {
        sessionStorage.removeItem('logado'); 
        window.location.href = "../index.html"; 
    });

    document.getElementById('btnhm').addEventListener('click', () => window.location.href = "p1.html");
    document.getElementById('btnfl').addEventListener('click', () => window.location.href = "fl.html");
    document.getElementById('btnnt').addEventListener('click', () => window.location.href = "info.html");
    document.getElementById('btnLP').addEventListener('click', () => window.location.href = "../sites/bar.html");

    // Inicializa a página corretamente chamando a função que você criou
    window.onload = carregarCards; 

</script>
</body>
</html>
