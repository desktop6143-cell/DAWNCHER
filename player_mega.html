<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Player MEGA</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body, html { height: 100%; background: #000; overflow: hidden; font-family: Arial, sans-serif; }
        
        .header {
            position: fixed;
            top: 0; left: 0; right: 0;
            background: rgba(0,0,0,0.8);
            color: white;
            padding: 10px 20px;
            z-index: 100;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .btn-voltar {
            color: white;
            text-decoration: none;
            font-size: 16px;
        }
        iframe {
            width: 100%;
            height: 100vh;
            border: none;
        }
    </style>
</head>
<body>

    <div class="header">
        <a href="javascript:history.back()" class="btn-voltar">← Voltar</a>
        <span id="titulo-player">Carregando...</span>
    </div>

    <iframe id="mega-player" allowfullscreen allow="autoplay"></iframe>

    <script>
// ==================== CONFIGURAÇÃO MEGA ====================
const idsMega = {
    // Agora você pode colar tanto o link de EMBED quanto o link de ARQUIVO comum
    1: "https://mega.nz/file/vD43XC7I#jVR0Y4lOc5EtkhtpIG5cjbSItyy-Fb6S36AophdnIGs",
    2: "https://mega.nz/file/SEU_CODIGO_AQUI_2#SUA_CHAVE_AQUI_2",
    3: "https://mega.nz/file/SEU_CODIGO_AQUI_3#SUA_CHAVE_AQUI_3"
};

// ==================== FUNÇÃO PARA ASSISTIR NO PLAYER MEGA ====================
function assistirFilme(numero, titulo) {
    let urlMega = idsMega[numero];
    
    if (!urlMega || urlMega.includes("SEU_CODIGO_AQUI")) {
        alert("Este filme ainda não está disponível no MEGA!");
        return;
    }

    // --- CORREÇÃO DE LINK ON-THE-FLY ---
    // Se o link vier como /file/, transformamos em /embed/ para o player funcionar
    if (urlMega.includes("mega.nz/file/")) {
        urlMega = urlMega.replace("mega.nz/file/", "mega.nz/embed/");
    }

    const idUnico = `FILME_OBVP_${numero}`;
    const caminhoPlayer = "../player_mega.html"; 

    // Usamos encodeURIComponent para garantir que símbolos como '#' e '&' no link do MEGA 
    // não confundam a URL do seu navegador
    window.location.href = `${caminhoPlayer}?id=${idUnico}&url=${encodeURIComponent(urlMega)}&titulo=${encodeURIComponent(titulo)}`;
}

// Botão principal (Certifique-se que numFilme e nomesFilmes estejam definidos no seu escopo global)
document.querySelector('#play-button').onclick = () => {
    assistirFilme(numFilme, nomesFilmes[numFilme]);
};
    </script>
</body>
</html>
