<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title id="titulo-player">Carregando...</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #0f0f0f;
            color: white;
            font-family: Arial, sans-serif;
            overflow: hidden;
        }
        .container {
            width: 100vw;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }
        .header {
            background: #1a1a1a;
            padding: 12px 15px;
            display: flex;
            align-items: center;
            gap: 12px;
            z-index: 10;
        }
        .back-btn {
            background: rgba(255,255,255,0.1);
            border: none;
            color: white;
            font-size: 24px;
            width: 45px;
            height: 45px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
        }
        .titulo {
            flex: 1;
            font-size: 17px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .player-wrapper {
            flex: 1;
            position: relative;
            background: #000;
        }
        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }
        .aviso-mobile {
            position: absolute;
            bottom: 15px;
            left: 15px;
            right: 15px;
            background: rgba(0,0,0,0.85);
            color: #ffcc00;
            padding: 12px 15px;
            border-radius: 8px;
            font-size: 14px;
            display: none;
            z-index: 20;
            text-align: center;
        }
        .loading {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            z-index: 15;
        }
    </style>
</head>
<body>

<div class="container">
    <!-- Header -->
    <div class="header">
        <button class="back-btn" onclick="window.history.back()">←</button>
        <div class="titulo" id="titulo-player">Carregando vídeo...</div>
    </div>

    <!-- Player -->
    <div class="player-wrapper">
        <div class="loading" id="loading">
            <p>🔄 Carregando vídeo...</p>
        </div>
        
        <iframe
            id="mega-player"
            allowfullscreen
            allow="autoplay; encrypted-media; picture-in-picture; fullscreen"
            sandbox="allow-scripts allow-same-origin allow-popups allow-forms">
        </iframe>

        <div class="aviso-mobile" id="aviso-mobile">
            ⚠️ espere até o video começar
        </div>
    </div>
</div>

<script>
// ==================== CONFIGURAÇÕES ====================
const params = new URLSearchParams(window.location.search);
const urlVideo = params.get('url');
const titulo = params.get('titulo');

// ==================== INICIALIZAÇÃO ====================
const tituloEl = document.getElementById('titulo-player');
const iframe = document.getElementById('mega-player');
const loading = document.getElementById('loading');
const avisoMobile = document.getElementById('aviso-mobile');

if (titulo) {
    const tituloDecodificado = decodeURIComponent(titulo);
    tituloEl.textContent = tituloDecodificado;
    document.title = tituloDecodificado;
}

if (urlVideo) {
    let linkFinal = decodeURIComponent(urlVideo);
    
    // Converte para embed se for link normal do Mega
    if (linkFinal.includes("mega.nz/file/")) {
        linkFinal = linkFinal.replace("mega.nz/file/", "mega.nz/embed/");
    }
    
    iframe.src = linkFinal;

    // Remove loading após 4 segundos
    setTimeout(() => {
        loading.style.display = 'none';
    }, 4000);

    // Detecta mobile e mostra aviso
    if (/Mobi|Android|iPhone|iPad/i.test(navigator.userAgent)) {
        avisoMobile.style.display = 'block';
    }

} else {
    tituloEl.textContent = "❌ Erro: Link não encontrado";
}

// ==================== BOTÃO ABRIR NO MEGA (Mobile) ====================
function abrirNoMega() {
    if (urlVideo) {
        let linkOriginal = decodeURIComponent(urlVideo);
        window.open(linkOriginal, '_blank');
    }
}

// Clique longo no player abre no Mega (útil no celular)
iframe.addEventListener('dblclick', abrirNoMega);

// Salvar no histórico (mantendo o que você já usa)
const idUser = sessionStorage.getItem('idUsuario') || localStorage.getItem('idUsuario');

async function salvarNoHistorico() {
    if (!idUser) return;
    // ... (cole aqui a função salvarNoHistorico completa que te passei antes)
}

// Chama histórico
window.addEventListener('load', salvarNoHistorico);
setInterval(salvarNoHistorico, 30000);
</script>

</body>
</html>
