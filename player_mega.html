<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Player MEGA</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body, html { height: 100%; background: #000; overflow: hidden; font-family: Arial, sans-serif; }
        
        .header {
            position: fixed;
            top: 0; left: 0; right: 0;
            background: rgba(0,0,0,0.8);
            color: white;
            padding: 10px 20px;
            z-index: 100;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .btn-voltar {
            color: white;
            text-decoration: none;
            font-size: 16px;
        }
        iframe {
            width: 100%;
            height: 100vh;
            border: none;
        }
    </style>
</head>
<body>

    <div class="header">
        <a href="javascript:history.back()" class="btn-voltar">← Voltar</a>
        <span id="titulo-player">Carregando...</span>
    </div>

 <iframe
    id="mega-player"
    width="100%"
    height="100%"
    src="SEU_LINK_EMBED_AQUI"
    frameborder="0"
    allowfullscreen
    allow="autoplay; encrypted-media; picture-in-picture; fullscreen"
    sandbox="allow-scripts allow-same-origin allow-popups allow-forms">
</iframe>

<script>
// ==================== CONFIGURAÇÕES ====================
const API_HISTORICO = 'https://script.google.com/macros/s/AKfycbxot8YdPc_33_trN2BfAj0dQBJBSTEtoX4X5-iAqLxR1_ZTJUOFGLiUH0YOt-J0JAH0IQ/exec';
const idUser = sessionStorage.getItem('idUsuario') || localStorage.getItem('idUsuario');

// Parâmetros da URL
const params = new URLSearchParams(window.location.search);
const urlVideo = params.get('url');
const tituloRaw = params.get('titulo') || "Vídeo sem título";
const tituloFormatado = decodeURIComponent(tituloRaw);

// ==================== INICIALIZAÇÃO ====================
// Atualiza título
if (tituloFormatado) {
    document.getElementById('titulo-player').innerText = tituloFormatado;
    document.title = tituloFormatado;
}

// Coloca o link do vídeo no iframe
if (urlVideo) {
    document.getElementById('mega-player').src = decodeURIComponent(urlVideo);
} else {
    document.getElementById('titulo-player').innerText = "Erro: Link não encontrado";
    console.error("Nenhuma URL de vídeo foi passada nos parâmetros.");
}

// Extrai número do episódio
let episodioAtual = "1";
const matchEp = tituloFormatado.match(/Epis[óo]dio\s*(\d+)/i);
if (matchEp) episodioAtual = matchEp[1];

// ==================== FUNÇÕES ====================
function obterTempoFormatado() {
    return new Date().toLocaleTimeString('pt-BR', {
        hour: '2-digit',
        minute: '2-digit',
        second: '2-digit',
        hour12: false
    });
}

async function salvarNoHistorico() {
    if (!idUser) return;

    const dados = {
        action: "salvar",
        id_user: idUser,
        titulo: tituloFormatado,
        url_acesso: window.location.href,
        episodio: episodioAtual,
        tempo: obterTempoFormatado()
    };

    try {
        await fetch(API_HISTORICO, {
            method: 'POST',
            mode: 'no-cors',
            headers: {
                'Content-Type': 'text/plain',
            },
            body: JSON.stringify(dados)
        });
        
        console.log(`[${dados.tempo}] ✅ Histórico salvo`);
    } catch (err) {
        console.error("❌ Erro ao salvar histórico:", err);
    }
}

// ==================== EVENTOS ====================
// Salvar ao carregar a página
window.addEventListener('load', () => {
    salvarNoHistorico();
});

// Salvar a cada 30 segundos
setInterval(salvarNoHistorico, 30000);

// Salvar ao sair da página
window.addEventListener('beforeunload', () => {
    salvarNoHistorico();
});

// Opcional: Salvar quando o usuário sai do foco da aba
window.addEventListener('blur', () => {
    salvarNoHistorico();
});
</script>
</body>
</html>
