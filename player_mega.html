<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title id="titulo-player">Carregando...</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #0f0f0f;
            color: white;
            font-family: Arial, sans-serif;
            overflow: hidden;
        }
        .container {
            width: 100vw;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }
        .header {
            background: #1a1a1a;
            padding: 12px 15px;
            display: flex;
            align-items: center;
            gap: 12px;
            z-index: 10;
        }
        .back-btn {
            background: rgba(255,255,255,0.1);
            border: none;
            color: white;
            font-size: 24px;
            width: 45px;
            height: 45px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
        }
        .titulo {
            flex: 1;
            font-size: 17px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .player-wrapper {
            flex: 1;
            position: relative;
            background: #000;
        }
        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }
        .aviso-mobile {
            position: absolute;
            bottom: 15px;
            left: 15px;
            right: 15px;
            background: rgba(231, 76, 60, 0.95);
            color: white;
            padding: 14px 16px;
            border-radius: 8px;
            font-size: 15px;
            text-align: center;
            z-index: 20;
            display: none; /* Escondido por padrão */
        }

        /* Mostra o aviso SOMENTE em telas pequenas (mobile) */
        @media (max-width: 768px) {
            .aviso-mobile {
                display: block;
            }
        }

        .loading {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            z-index: 15;
            display: none;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <button class="back-btn" onclick="window.history.back()">←</button>
        <div class="titulo" id="titulo-player">Carregando vídeo...</div>
    </div>

    <div class="player-wrapper">
        <div class="loading" id="loading">
            <p>🔄 Carregando vídeo do Mega...</p>
        </div>
        
        <iframe
            id="mega-player"
            allowfullscreen
            allow="autoplay; encrypted-media; picture-in-picture; fullscreen"
            sandbox="allow-scripts allow-same-origin allow-popups allow-forms">
        </iframe>

        <div class="aviso-mobile" id="aviso-mobile">
            ⚠️ O player do Mega nem sempre funciona bem no celular.<br>
            <strong>Toque aqui para abrir direto no Mega</strong>
        </div>
    </div>
</div>

<script>
// ==================== CONFIGURAÇÕES ====================
const params = new URLSearchParams(window.location.search);
const urlVideo = params.get('url');
const tituloRaw = params.get('titulo');

const tituloEl = document.getElementById('titulo-player');
const iframe = document.getElementById('mega-player');
const loading = document.getElementById('loading');
const avisoMobile = document.getElementById('aviso-mobile');

// ==================== INICIALIZAÇÃO ====================
if (tituloRaw) {
    const tituloDecodificado = decodeURIComponent(tituloRaw);
    tituloEl.textContent = tituloDecodificado;
    document.title = tituloDecodificado;
}

if (urlVideo) {
    let linkFinal = decodeURIComponent(urlVideo);
    
    if (linkFinal.includes("mega.nz/file/")) {
        linkFinal = linkFinal.replace("mega.nz/file/", "mega.nz/embed/");
    }
    
    iframe.src = linkFinal;

    // Esconde loading depois de um tempo
    setTimeout(() => loading.style.display = 'none', 3500);

} else {
    tituloEl.textContent = "❌ Link não encontrado";
}

// ==================== ABRIR NO MEGA (Mobile) ====================
avisoMobile.style.cursor = "pointer";
avisoMobile.addEventListener('click', () => {
    if (urlVideo) {
        const linkOriginal = decodeURIComponent(urlVideo);
        window.open(linkOriginal, '_blank');
    }
});

// Clique duplo no iframe também abre no Mega
iframe.addEventListener('dblclick', () => {
    if (urlVideo) window.open(decodeURIComponent(urlVideo), '_blank');
});
</script>

</body>
</html>
